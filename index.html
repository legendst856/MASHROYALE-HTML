<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale 3D: Origins</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        
        :root {
            --bronz: #cd7f32; --silv: #bdc3c7; --gold: #fbc531; --diam: #3498db;
            --purple: #9c88ff; --dark: #2f3640; --bg: #1e272e;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--bg); margin: auto; display: flex; flex-direction: column; }

        /* HEADER */
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid #444; z-index: 100; }
        .currency { display: flex; gap: 15px; font-weight: 800; font-size: 14px; }

        /* LOGIN */
        #login-screen { position: absolute; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 15px; border-radius: 10px; border: none; width: 80%; margin: 15px 0; font-size: 18px; text-align: center; }

        /* NAVEGACIÓN */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }

        /* CARTAS Y MEJORAS UNIDAS */
        .section-title { font-family: 'Bangers'; font-size: 24px; color: var(--gold); margin: 15px 0 10px 0; border-bottom: 2px solid #444; }
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .card { 
            background: #353b48; border-radius: 8px; padding: 5px; text-align: center; 
            position: relative; border: 2px solid #555; transition: 0.2s; cursor: pointer;
        }
        .card.in-deck { border-color: #fff; box-shadow: 0 0 8px #fff; }
        .rare-bronz { border-bottom: 4px solid var(--bronz); }
        .rare-silv { border-bottom: 4px solid var(--silv); }
        .rare-gold { border-bottom: 4px solid var(--gold); }
        .rare-diam { border-bottom: 4px solid var(--diam); }
        .lvl-tag { position: absolute; bottom: 2px; right: 2px; background: #000; color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 4px; }

        /* MODAL DE CARTA */
        #card-modal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: #2f3640; border-radius: 20px; border: 4px solid var(--gold);
            z-index: 2000; padding: 20px; text-align: center;
        }

        /* PASE */
        .pass-item { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* NAV */
        nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: #1a1a1a; display: flex; border-top: 3px solid #000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--gold); background: rgba(255,255,255,0.1); }

        /* BATALLA 3D */
        #battle-view { display: none; position: absolute; inset: 0; z-index: 4000; background: #000; }
        #ui-battle { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 10px; box-sizing: border-box; }
        .hand { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .mini-card { width: 60px; height: 80px; background: #34495e; border-radius: 6px; border: 2px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .elixir-bg { height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #elixir-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.1s linear; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h1 style="font-family:'Bangers'; font-size: 50px; color: var(--gold); margin: 0;">MASHROYALE</h1>
        <p>CONECTANDO AL SERVIDOR...</p>
        <input type="text" id="user-name" placeholder="Tu Nombre de Guerrero">
        <button onclick="login()" style="background:var(--gold); border:none; padding:15px 50px; border-radius:10px; font-family:'Bangers'; font-size:24px; cursor:pointer;">EMPEZAR</button>
    </div>

    <header>
        <div id="display-name" style="font-family:'Bangers'; color:var(--gold)">JUGADOR</div>
        <div class="currency">
            <span>💰 <span id="gold-val">500</span></span>
            <span>🏆 <span id="cups-val">0</span></span>
        </div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div style="text-align:center; padding:40px 20px; background: linear-gradient(to bottom, #2980b9, #2c3e50); border-radius:20px; border:4px solid #fff;">
                <h1 id="arena-txt" style="font-family:'Bangers'; font-size:35px; margin:0;">ESTADIO DUENDE</h1>
                <p>ARENA <span id="arena-num">1</span></p>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:6px solid #d35400; padding:15px 50px; font-family:'Bangers'; font-size:35px; color:#fff; border-radius:15px; margin-top:20px;">¡BATALLA!</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <div class="section-title">MAZO DE BATALLA</div>
            <div class="card-grid" id="deck-grid"></div>
            
            <div class="section-title">COLECCIÓN DE CARTAS</div>
            <div class="card-grid" id="collection-grid"></div>
        </div>

        <div id="view-pass" class="view">
            <h2 style="font-family:'Bangers'; text-align:center;">PASE DE BATALLA</h2>
            <div id="pass-container"></div>
        </div>
    </div>

    <div id="card-modal">
        <h2 id="modal-name" style="font-family:'Bangers'; margin:0">NOMBRE</h2>
        <div id="modal-emoji" style="font-size:60px">⚔️</div>
        <p id="modal-stats"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="btn-use" onclick="useCard()" style="background:var(--diam); border:none; padding:10px 20px; border-radius:8px; color:#fff; font-weight:800;">USAR</button>
            <button id="btn-up" onclick="upgradeCard()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:8px; font-weight:800;">MEJORAR</button>
        </div>
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#aaa; text-decoration:underline;">Cerrar</button>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>CARTAS</div>
        <div class="nav-item active" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchTab('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-bg"><div id="elixir-fill"></div></div>
        </div>
    </div>
</div>

<script>
    // --- LAS 20 CARTAS ---
    const ALL_CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", rarity: "bronz", cost: 3, hp: 1400, dmg: 160, arena: 1 },
        { id: 1, name: "Archeras", emoji: "🏹", rarity: "bronz", cost: 3, hp: 600, dmg: 90, arena: 1 },
        { id: 2, name: "Bombardero", emoji: "💣", rarity: "bronz", cost: 2, hp: 500, dmg: 200, arena: 1 },
        { id: 3, name: "Flechas", emoji: "💘", rarity: "bronz", cost: 3, hp: 1, dmg: 300, arena: 1 },
        { id: 4, name: "Gigante", emoji: "🧔", rarity: "silv", cost: 5, hp: 3500, dmg: 210, arena: 1 },
        { id: 5, name: "Mosquetera", emoji: "👩‍🚀", rarity: "silv", cost: 4, hp: 800, dmg: 200, arena: 2 },
        { id: 6, name: "Mini PEKKA", emoji: "🤖", rarity: "silv", cost: 4, hp: 1150, dmg: 650, arena: 2 },
        { id: 7, name: "Montapuerco", emoji: "🐗", rarity: "silv", cost: 4, hp: 1500, dmg: 300, arena: 2 },
        { id: 8, name: "Valquiria", emoji: "🪓", rarity: "silv", cost: 4, hp: 1500, dmg: 220, arena: 2 },
        { id: 9, name: "Bebé Dragón", emoji: "🐉", rarity: "gold", cost: 4, hp: 1100, dmg: 100, arena: 3 },
        { id: 10, name: "Príncipe", emoji: "🏇", rarity: "gold", cost: 5, hp: 1800, dmg: 350, arena: 3 },
        { id: 11, name: "Mago", emoji: "🔥", rarity: "gold", cost: 5, hp: 700, dmg: 240, arena: 3 },
        { id: 12, name: "P.E.K.K.A", emoji: "🦾", rarity: "gold", cost: 7, hp: 3800, dmg: 800, arena: 4 },
        { id: 13, name: "Globo", emoji: "🎈", rarity: "gold", cost: 5, hp: 1400, dmg: 900, arena: 4 },
        { id: 14, name: "Chispitas", emoji: "⚡", rarity: "diam", cost: 6, hp: 1200, dmg: 1200, arena: 4 },
        { id: 15, name: "Mago Eléct.", emoji: "🌩️", rarity: "diam", cost: 4, hp: 700, dmg: 100, arena: 5 },
        { id: 16, name: "Megacaballero", emoji: "🛡️", rarity: "diam", cost: 7, hp: 3500, dmg: 250, arena: 5 },
        { id: 17, name: "Minero", emoji: "⛏️", rarity: "diam", cost: 3, hp: 1200, dmg: 120, arena: 5 },
        { id: 18, name: "Mago de Hielo", emoji: "❄️", rarity: "diam", cost: 3, hp: 800, dmg: 80, arena: 5 },
        { id: 19, name: "Tronco", emoji: "🪵", rarity: "gold", cost: 2, hp: 1, dmg: 280, arena: 3 }
    ];

    let player = { name: "", gold: 1000, trophies: 0, deck: [0, 1, 4, 6], lvls: {} };
    let selectedId = null;

    // --- SISTEMA DE GUARDADO ---
    function login() {
        const input = document.getElementById('user-name').value;
        if(!input) return alert("Escribe un nombre");
        player.name = input;
        const data = localStorage.getItem('mash_v2_' + input);
        if(data) player = JSON.parse(data);
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
    }

    function save() { localStorage.setItem('mash_v2_' + player.name, JSON.stringify(player)); }

    // --- UI Y PESTAÑAS ---
    function switchTab(view, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active-view');
        el.classList.add('active');
        if(view === 'cards') renderCards();
        if(view === 'pass') renderPass();
    }

    function renderCards() {
        const deckGrid = document.getElementById('deck-grid');
        const collGrid = document.getElementById('collection-grid');
        
        deckGrid.innerHTML = player.deck.map(id => createCardHTML(ALL_CARDS[id], true)).join('');
        collGrid.innerHTML = ALL_CARDS.map(c => createCardHTML(c, false)).join('');
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        return `
            <div class="card rare-${c.rarity} ${isDeck ? 'in-deck' : ''}" onclick="openModal(${c.id})">
                <div style="font-size:24px">${c.emoji}</div>
                <div style="font-size:8px; font-weight:800">${c.name.toUpperCase()}</div>
                <div class="lvl-tag">Lv ${lvl}</div>
            </div>
        `;
    }

    function openModal(id) {
        selectedId = id;
        const c = ALL_CARDS[id];
        const lvl = player.lvls[id] || 1;
        document.getElementById('modal-name').innerText = c.name;
        document.getElementById('modal-emoji').innerText = c.emoji;
        document.getElementById('modal-stats').innerHTML = `HP: ${Math.floor(c.hp * (1 + lvl*0.1))} | DMG: ${Math.floor(c.dmg * (1 + lvl*0.1))}<br>Coste: 💧 ${c.cost}`;
        document.getElementById('btn-up').innerText = `MEJORAR 💰 ${lvl * 200}`;
        document.getElementById('card-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('card-modal').style.display = 'none'; }

    function useCard() {
        if(!player.deck.includes(selectedId) && player.deck.length < 4) {
            player.deck.push(selectedId);
        } else if(player.deck.includes(selectedId)) {
            player.deck = player.deck.filter(i => i !== selectedId);
        } else {
            alert("Máximo 4 cartas en el mazo");
        }
        save(); renderCards(); closeModal();
    }

    function upgradeCard() {
        const lvl = player.lvls[selectedId] || 1;
        const cost = lvl * 200;
        if(player.gold >= cost) {
            player.gold -= cost;
            player.lvls[selectedId] = lvl + 1;
            save(); updateUI(); renderCards(); openModal(selectedId);
        } else {
            alert("No tienes suficiente oro");
        }
    }

    function updateUI() {
        document.getElementById('display-name').innerText = player.name;
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
    }

    function renderPass() {
        const container = document.getElementById('pass-container');
        const levels = [0, 500, 1000, 1500, 2000];
        container.innerHTML = levels.map((t, i) => `
            <div class="pass-item" style="opacity: ${player.trophies >= t ? '1' : '0.5'}">
                <span>Nivel ${i+1} (${t} 🏆)</span>
                <b>${i % 2 === 0 ? '🎁 Cofre' : '💰 500 Oro'}</b>
            </div>
        `).join('');
    }

    // --- BATALLA 3D CON THREE.JS ---
    let scene, camera, renderer, elixir = 0;
    function openBattle() {
        if(player.deck.length < 4) return alert("Completa tu mazo de 4 cartas");
        document.getElementById('battle-view').style.display = 'block';
        init3D();
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3d3d3d); // Suelo gris de arena
        
        camera = new THREE.PerspectiveCamera(75, 480/800, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('app-container').clientWidth, window.innerHeight - 150);
        document.getElementById('battle-canvas').innerHTML = "";
        document.getElementById('battle-canvas').appendChild(renderer.domElement);

        // Luces
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // El CAMPO (3D)
        const grassGeo = new THREE.BoxGeometry(20, 1, 40);
        const grassMat = new THREE.MeshPhongMaterial({color: 0x27ae60});
        const field = new THREE.Mesh(grassGeo, grassMat);
        field.position.y = -0.5;
        scene.add(field);

        // Torres
        createTower(-4, 12, 0x3498db); // Aliada
        createTower(4, 12, 0x3498db);  // Aliada
        createTower(-4, -12, 0xe74c3c); // Enemiga
        createTower(4, -12, 0xe74c3c);  // Enemiga

        camera.position.set(0, 22, 20);
        camera.lookAt(0, 0, -2);

        renderBattleHand();
        battleLoop();
    }

    function createTower(x, z, color) {
        const geo = new THREE.CylinderGeometry(1.5, 2, 5, 8);
        const mat = new THREE.MeshPhongMaterial({color: color});
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, 2.5, z);
        scene.add(mesh);
    }

    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = player.deck.map(id => {
            const c = ALL_CARDS[id];
            return `<div class="mini-card" onclick="spawnUnit(${id})">
                <span style="font-size:20px">${c.emoji}</span>
                <span style="color:var(--purple); font-weight:800">💧${c.cost}</span>
            </div>`;
        }).join('');
    }

    function spawnUnit(id) {
        const c = ALL_CARDS[id];
        if(elixir >= c.cost) {
            elixir -= c.cost;
            const geo = new THREE.SphereGeometry(1);
            const mat = new THREE.MeshPhongMaterial({color: 0x3498db});
            const unit = new THREE.Mesh(geo, mat);
            unit.position.set((Math.random()-0.5)*8, 1, 8);
            scene.add(unit);
            
            // Animación simple de ataque
            const move = () => {
                unit.position.z -= 0.15;
                if(unit.position.z > -12) requestAnimationFrame(move);
                else { scene.remove(unit); winBattle(); }
            };
            move();
        }
    }

    function battleLoop() {
        if(document.getElementById('battle-view').style.display === 'none') return;
        requestAnimationFrame(battleLoop);
        elixir = Math.min(10, elixir + 0.008);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
        renderer.render(scene, camera);
    }

    function winBattle() {
        alert("¡TORRE DESTRUIDA! +30 Copas");
        player.trophies += 30; player.gold += 150;
        document.getElementById('battle-view').style.display = 'none';
        save(); updateUI();
    }

    updateUI();
</script>
</body>
</html>
