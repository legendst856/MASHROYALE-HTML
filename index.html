<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale 3D Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@800&display=swap');
        
        :root {
            --bronz: #cd7f32; --silv: #bdc3c7; --gold: #fbc531; --diam: #3498db;
            --purple: #9c88ff; --dark: #1e272e;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--dark); margin: auto; display: flex; flex-direction: column; }

        /* --- HEADER MEJORADO --- */
        header { 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(to bottom, #2c3e50, #1a1a1a); border-bottom: 3px solid var(--gold); z-index: 100; 
        }
        #display-name { 
            font-family: 'Bangers'; font-size: 24px; color: #fff; 
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000; letter-spacing: 1px;
            background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 5px;
        }
        .currency { display: flex; gap: 12px; font-weight: 800; font-size: 14px; text-shadow: 1px 1px 2px #000; }

        /* LOGIN */
        #login-screen { position: absolute; inset: 0; background: radial-gradient(circle, #2980b9, #2c3e50); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border-radius: 10px; border: 3px solid var(--gold); width: 70%; margin: 15px 0; font-size: 18px; text-align: center; font-family: 'Bangers'; }

        /* NAVEGACIÓN */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }

        /* COLECCIÓN + UPGRADES */
        .section-title { font-family: 'Bangers'; font-size: 26px; color: var(--gold); margin: 15px 0; text-align: center; text-transform: uppercase; }
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { 
            background: #34495e; border-radius: 10px; padding: 5px; text-align: center; 
            position: relative; border: 2px solid #555; transition: 0.2s; cursor: pointer;
        }
        .card.in-deck { border: 3px solid #fff; transform: scale(1.05); z-index: 2; box-shadow: 0 0 10px #fff; }
        .rare-bronz { border-bottom: 5px solid var(--bronz); }
        .rare-silv { border-bottom: 5px solid var(--silv); }
        .rare-gold { border-bottom: 5px solid var(--gold); }
        .rare-diam { border-bottom: 5px solid var(--diam); }
        .lvl-tag { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-size: 10px; padding: 2px 5px; border-radius: 5px; font-weight: 900; }

        /* MODAL */
        #card-modal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: #2f3640; border-radius: 20px; border: 5px solid var(--gold);
            z-index: 2000; padding: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* PASE */
        .pass-item { background: #34495e; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; border-left: 8px solid var(--gold); }

        /* NAV */
        nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: #1a1a1a; display: flex; border-top: 3px solid #000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7f8c8d; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); background: rgba(255,197,49,0.1); }

        /* --- BATALLA 3D PRO --- */
        #battle-view { display: none; position: absolute; inset: 0; z-index: 4000; background: #000; }
        #ui-battle { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px; box-sizing: border-box; }
        .hand { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .mini-card { 
            width: 70px; height: 95px; background: #2c3e50; border-radius: 8px; border: 2px solid #fff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .elixir-container { height: 14px; background: #222; border-radius: 7px; border: 2px solid #000; overflow: hidden; }
        #elixir-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.1s linear; box-shadow: 0 0 10px var(--purple); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h1 style="font-family:'Bangers'; font-size: 60px; color: var(--gold); margin: 0; text-shadow: 4px 4px #000;">MASHROYALE</h1>
        <input type="text" id="user-name" placeholder="NOMBRE DEL GUERRERO">
        <button onclick="login()" style="background:var(--gold); border:none; padding:15px 60px; border-radius:15px; font-family:'Bangers'; font-size:28px; cursor:pointer; border-bottom: 5px solid #d35400;">¡ENTRAR!</button>
    </div>

    <header>
        <div id="display-name">JUGADOR</div>
        <div class="currency">
            <span>💰 <span id="gold-val">1000</span></span>
            <span>🏆 <span id="cups-val">0</span></span>
        </div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div style="text-align:center; padding:50px 20px; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), linear-gradient(135deg, #2980b9, #2c3e50); border-radius:25px; border:5px solid #fff; margin-top: 20px;">
                <h1 id="arena-txt" style="font-family:'Bangers'; font-size:40px; margin:0; text-shadow: 2px 2px #000;">ESTADIO DUENDE</h1>
                <p style="font-weight: 800; letter-spacing: 2px;">ARENA <span id="arena-num">1</span></p>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:8px solid #d35400; padding:15px 60px; font-family:'Bangers'; font-size:40px; color:#fff; border-radius:20px; margin-top:30px; cursor:pointer;">¡BATALLA!</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <div class="section-title">Tu Mazo Activo</div>
            <div class="card-grid" id="deck-grid"></div>
            
            <div class="section-title">Colección y Upgrades</div>
            <div class="card-grid" id="collection-grid"></div>
        </div>

        <div id="view-pass" class="view">
            <h2 class="section-title">Pase Real</h2>
            <div id="pass-container"></div>
        </div>
    </div>

    <div id="card-modal">
        <h2 id="modal-name" style="font-family:'Bangers'; font-size: 32px; color: var(--gold);">NOMBRE</h2>
        <div id="modal-emoji" style="font-size:80px; margin: 10px 0;">⚔️</div>
        <div id="modal-stats" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: 800;"></div>
        <div style="display:flex; gap:15px; justify-content:center;">
            <button id="btn-use" onclick="useCard()" style="background:var(--diam); border:none; padding:12px 25px; border-radius:10px; color:#fff; font-weight: 800; cursor:pointer;">SELECCIONAR</button>
            <button id="btn-up" onclick="upgradeCard()" style="background:var(--gold); border:none; padding:12px 25px; border-radius:10px; font-weight: 800; cursor:pointer; color: #000;">MEJORAR</button>
        </div>
        <br>
        <button onclick="closeModal()" style="color:#aaa; border:none; background:none; text-decoration: underline; cursor:pointer;">Volver</button>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>CARTAS</div>
        <div class="nav-item active" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchTab('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-container"><div id="elixir-fill"></div></div>
        </div>
    </div>
</div>

<script>
    const ALL_CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", rarity: "bronz", cost: 3, hp: 1400, dmg: 160 },
        { id: 1, name: "Archeras", emoji: "🏹", rarity: "bronz", cost: 3, hp: 600, dmg: 90 },
        { id: 2, name: "Bombardero", emoji: "💣", rarity: "bronz", cost: 2, hp: 500, dmg: 200 },
        { id: 3, name: "Flechas", emoji: "💘", rarity: "bronz", cost: 3, hp: 1, dmg: 300 },
        { id: 4, name: "Gigante", emoji: "🧔", rarity: "silv", cost: 5, hp: 3500, dmg: 210 },
        { id: 5, name: "Mosquetera", emoji: "👩‍🚀", rarity: "silv", cost: 4, hp: 800, dmg: 200 },
        { id: 6, name: "Mini PEKKA", emoji: "🤖", rarity: "silv", cost: 4, hp: 1150, dmg: 650 },
        { id: 7, name: "Montapuerco", emoji: "🐗", rarity: "silv", cost: 4, hp: 1500, dmg: 300 },
        { id: 8, name: "Valquiria", emoji: "🪓", rarity: "silv", cost: 4, hp: 1500, dmg: 220 },
        { id: 9, name: "Bebé Dragón", emoji: "🐉", rarity: "gold", cost: 4, hp: 1100, dmg: 100 },
        { id: 10, name: "Príncipe", emoji: "🏇", rarity: "gold", cost: 5, hp: 1800, dmg: 350 },
        { id: 11, name: "Mago", emoji: "🔥", rarity: "gold", cost: 5, hp: 700, dmg: 240 },
        { id: 12, name: "P.E.K.K.A", emoji: "🦾", rarity: "gold", cost: 7, hp: 3800, dmg: 800 },
        { id: 13, name: "Globo", emoji: "🎈", rarity: "gold", cost: 5, hp: 1400, dmg: 900 },
        { id: 14, name: "Chispitas", emoji: "⚡", rarity: "diam", cost: 6, hp: 1200, dmg: 1200 },
        { id: 15, name: "Mago Eléct.", emoji: "🌩️", rarity: "diam", cost: 4, hp: 700, dmg: 100 },
        { id: 16, name: "Megacaballero", emoji: "🛡️", rarity: "diam", cost: 7, hp: 3500, dmg: 250 },
        { id: 17, name: "Minero", emoji: "⛏️", rarity: "diam", cost: 3, hp: 1200, dmg: 120 },
        { id: 18, name: "Mago de Hielo", emoji: "❄️", rarity: "diam", cost: 3, hp: 800, dmg: 80 },
        { id: 19, name: "Tronco", emoji: "🪵", rarity: "gold", cost: 2, hp: 1, dmg: 280 }
    ];

    let player = { name: "", gold: 1500, trophies: 0, deck: [0, 1, 4, 6], lvls: {} };
    let selectedId = null;

    // LOGIN & SAVE
    function login() {
        const input = document.getElementById('user-name').value;
        if(!input) return alert("Escribe tu nombre");
        player.name = input;
        const data = localStorage.getItem('mash_pro_' + input);
        if(data) player = JSON.parse(data);
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
    }
    function save() { localStorage.setItem('mash_pro_' + player.name, JSON.stringify(player)); }

    function switchTab(view, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active-view');
        el.classList.add('active');
        if(view === 'cards') renderCards();
        if(view === 'pass') renderPass();
    }

    function renderCards() {
        const deckGrid = document.getElementById('deck-grid');
        const collGrid = document.getElementById('collection-grid');
        deckGrid.innerHTML = player.deck.map(id => createCardHTML(ALL_CARDS[id], true)).join('');
        collGrid.innerHTML = ALL_CARDS.map(c => createCardHTML(c, false)).join('');
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        return `<div class="card rare-${c.rarity} ${isDeck ? 'in-deck' : ''}" onclick="openModal(${c.id})">
                    <div style="font-size:28px">${c.emoji}</div>
                    <div style="font-size:9px; font-weight:800; margin-top:5px;">${c.name.toUpperCase()}</div>
                    <div class="lvl-tag">NIVEL ${lvl}</div>
                </div>`;
    }

    function openModal(id) {
        selectedId = id;
        const c = ALL_CARDS[id];
        const lvl = player.lvls[id] || 1;
        document.getElementById('modal-name').innerText = c.name;
        document.getElementById('modal-emoji').innerText = c.emoji;
        document.getElementById('modal-stats').innerHTML = `❤️ VIDA: ${Math.floor(c.hp * (1 + lvl*0.12))} <br> ⚔️ DAÑO: ${Math.floor(c.dmg * (1 + lvl*0.12))} <br> 💧 COSTE: ${c.cost}`;
        document.getElementById('btn-up').innerText = `MEJORAR 💰 ${lvl * 250}`;
        document.getElementById('card-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('card-modal').style.display = 'none'; }

    function useCard() {
        if(!player.deck.includes(selectedId) && player.deck.length < 4) player.deck.push(selectedId);
        else if(player.deck.includes(selectedId)) player.deck = player.deck.filter(i => i !== selectedId);
        else alert("Mazo lleno (4 cartas)");
        save(); renderCards(); closeModal();
    }

    function upgradeCard() {
        const lvl = player.lvls[selectedId] || 1;
        const cost = lvl * 250;
        if(player.gold >= cost) {
            player.gold -= cost;
            player.lvls[selectedId] = lvl + 1;
            save(); updateUI(); renderCards(); openModal(selectedId);
        } else alert("Oro insuficiente");
    }

    function updateUI() {
        document.getElementById('display-name').innerText = player.name.toUpperCase();
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
    }

    // --- MOTOR DE BATALLA 3D (RECONSTRUIDO) ---
    let scene, camera, renderer, elixir = 0;
    let units = [], towers = [];

    function openBattle() {
        if(player.deck.length < 4) return alert("¡Necesitas 4 cartas en tu mazo!");
        document.getElementById('battle-view').style.display = 'block';
        init3D();
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x27ae60);
        
        camera = new THREE.PerspectiveCamera(75, 480/800, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('app-container').clientWidth, window.innerHeight - 150);
        document.getElementById('battle-canvas').innerHTML = "";
        document.getElementById('battle-canvas').appendChild(renderer.domElement);

        // Iluminación
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Campo con textura de líneas
        const fieldGeo = new THREE.PlaneGeometry(20, 40);
        const fieldMat = new THREE.MeshPhongMaterial({color: 0x2ecc71});
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI/2;
        scene.add(field);

        // Río central
        const riverGeo = new THREE.PlaneGeometry(20, 4);
        const riverMat = new THREE.MeshPhongMaterial({color: 0x3498db});
        const river = new THREE.Mesh(riverGeo, riverMat);
        river.rotation.x = -Math.PI/2;
        river.position.y = 0.01;
        scene.add(river);

        // Torres Aliadas (Azules) y Enemigas (Rojas)
        towers = [];
        spawnTower(-5, 15, 0x2980b9, "player"); 
        spawnTower(5, 15, 0x2980b9, "player");
        spawnTower(-5, -15, 0xc0392b, "enemy"); 
        spawnTower(5, -15, 0xc0392b, "enemy");

        camera.position.set(0, 28, 25);
        camera.lookAt(0, 0, -5);

        renderBattleHand();
        battleLoop();
    }

    function spawnTower(x, z, color, owner) {
        const group = new THREE.Group();
        const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.8, 4, 8), new THREE.MeshPhongMaterial({color: color}));
        const top = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1, 2.2), new THREE.MeshPhongMaterial({color: 0x333333}));
        top.position.y = 2.5;
        group.add(base); group.add(top);
        group.position.set(x, 2, z);
        scene.add(group);
        towers.push({ mesh: group, owner: owner, hp: 2000 });
    }

    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = player.deck.map(id => {
            const c = ALL_CARDS[id];
            return `<div class="mini-card" onclick="playUnit(${id})">
                        <span style="font-size:24px">${c.emoji}</span>
                        <span style="color:var(--purple); font-weight:900">💧${c.cost}</span>
                    </div>`;
        }).join('');
    }

    function playUnit(id) {
        const c = ALL_CARDS[id];
        if(elixir >= c.cost) {
            elixir -= c.cost;
            const unitMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshPhongMaterial({color: 0x3498db}));
            unitMesh.position.set((Math.random()-0.5)*10, 0.6, 12);
            scene.add(unitMesh);
            units.push({ mesh: unitMesh, speed: 0.1, target: towers.find(t => t.owner === "enemy") });
        }
    }

    function battleLoop() {
        if(document.getElementById('battle-view').style.display === 'none') return;
        requestAnimationFrame(battleLoop);
        
        elixir = Math.min(10, elixir + 0.012);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

        units.forEach((u, i) => {
            u.mesh.position.z -= u.speed;
            if(u.mesh.position.z < -14) {
                scene.remove(u.mesh);
                units.splice(i, 1);
                winGame();
            }
        });

        renderer.render(scene, camera);
    }

    function winGame() {
        alert("¡VICTORIA! +32 COPAS");
        player.trophies += 32; player.gold += 200;
        document.getElementById('battle-view').style.display = 'none';
        save(); updateUI();
    }

    function renderPass() {
        const container = document.getElementById('pass-container');
        const tiers = [0, 200, 500, 1000, 2000];
        container.innerHTML = tiers.map((t, i) => `
            <div class="pass-item" style="opacity: ${player.trophies >= t ? '1' : '0.4'}">
                <span>NIVEL ${i+1} (${t} 🏆)</span>
                <b>${i%2==0 ? '📦 COFRE' : '💰 1000 ORO'}</b>
            </div>
        `).join('');
    }

    updateUI();
</script>
</body>
</html>
