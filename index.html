
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale Ultra Arena 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        
        :root {
            --bronz: #cd7f32; --silv: #bdc3c7; --gold: #fbc531; --diam: #3498db;
            --purple: #9c88ff; --dark: #1e272e;
            --bg: #0f141a; /* Fondo oscuro general */
        }

        body { margin: 0; background: var(--bg); font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--bg); border-left: 2px solid #333; border-right: 2px solid #333; }

        /* HEADER MEJORADO (LEGIBLE) */
        header { 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); border-bottom: 3px solid var(--gold); z-index: 100; 
        }
        #display-name { 
            font-family: 'Bangers'; font-size: 24px; color: #fff; 
            text-shadow: 2px 2px 0px #000; background: rgba(0,0,0,0.4); padding: 2px 12px; border-radius: 8px;
        }
        .currency { display: flex; gap: 12px; font-weight: 800; font-size: 14px; }

        /* LOGIN */
        #login-screen { 
            position: absolute; inset: 0; background: var(--bg); z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; backdrop-filter: blur(5px);
        }
        #login-screen h1 { margin-bottom: 20px; }
        #login-screen p { color: var(--silv); margin-bottom: 15px; }
        input[type="text"] { 
            padding: 15px; border-radius: 10px; border: none; 
            width: 80%; margin: 15px 0; font-size: 18px; text-align: center; 
            background: var(--dark); color: white; 
        }
        input[type="text"]::placeholder { color: var(--silv); }
        button { 
            background: var(--gold); border: none; padding: 15px 50px; 
            border-radius: 10px; font-family: 'Bangers'; font-size: 24px; 
            cursor: pointer; transition: transform 0.2s ease;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }


        /* NAVEGACIÓN Y PÁGINAS */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 90px; padding: 15px; box-sizing: border-box; }
        .view { display: none; padding: 15px; box-sizing: border-box; z-index: 10; }
        .active-view { display: block; }

        /* CARTAS Y MEJORAS UNIDAS */
        .section-title { font-family: 'Bangers'; font-size: 24px; color: var(--gold); margin: 15px 0 10px 0; border-bottom: 2px solid #444; padding-bottom: 5px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .card { 
            background: #353b48; border-radius: 12px; padding: 8px; text-align: center; 
            position: relative; border: 3px solid #555; transition: 0.2s ease-in-out, border-color 0.2s ease-in-out; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 3/4;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .card.selected { border-color: var(--gold); background: #4b6584; }
        .card-cost { 
            position: absolute; top: -8px; left: -8px; 
            background: var(--purple); width: 28px; height: 28px; border-radius: 50%; 
            font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 5;
            border: 2px solid white;
        }
        .card-name { font-size: 10px; font-weight: 800; color: var(--gold); margin-top: 5px; }
        .lvl-badge { 
            position: absolute; bottom: -8px; right: -8px; 
            background: #fff; color: #000; padding: 3px 8px; 
            border-radius: 12px; font-size: 11px; font-weight: 800;
            border: 2px solid #333;
        }

        /* PASE ROYAL */
        .pass-row { 
            background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 15px; 
            border-radius: 10px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .pass-row.locked { color: var(--silv); }
        .pass-row.unlocked { background: rgba(255,255,255,0.1); border-color: var(--gold); }


        /* NAV INFERIOR */
        nav { 
            position: absolute; bottom: 0; width: 100%; height: 80px; 
            background: #2f3640; display: flex; border-top: 3px solid #111; z-index: 100; 
            box-shadow: 0 -5px 10px rgba(0,0,0,0.3);
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; color: #718093; font-weight: 800; 
            transition: 0.2s ease; font-size: 14px;
        }
        .nav-item span { font-size: 24px; margin-bottom: 5px; }
        .nav-item.active-nav { color: var(--gold); background: rgba(255,255,255,0.05); }
        .nav-item:hover { background: rgba(255,255,255,0.02); }

        /* --- BATALLA 3D (MEJORADA - IDENTICA A CR) --- */
        #battle-view { 
            display: none; position: absolute; inset: 0; z-index: 4000; 
            background: #000; 
        }
        #battle-canvas { width: 100%; height: calc(100vh - 150px); position: relative; } /* Ajuste para UI inferior */
        #ui-battle { 
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.85)); 
            padding: 10px; box-sizing: border-box; pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        .hand { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .mini-card { 
            width: 65px; height: 85px; background: #2c3e50; border-radius: 10px; 
            border: 3px solid #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            transition: transform 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .mini-card:hover { transform: scale(1.05); }
        .mini-card.active-play { 
            border-color: var(--gold); transform: scale(1.1); 
            box-shadow: 0 0 15px var(--gold);
        }
        .mini-card span:first-child { font-size: 28px; }
        .mini-card span:last-child { font-weight: 900; color: var(--purple); }

        .elixir-bg { 
            height: 16px; background: #333; border-radius: 8px; 
            overflow: hidden; border: 1px solid #111; width: 90%; 
            margin: 0 auto;
        }
        #elixir-fill { 
            height: 100%; background: var(--purple); width: 0%; 
            transition: width 0.1s linear; border-radius: 8px 0 0 8px;
        }

        /* --- ESTILOS DE LA ARENA 3D --- */
        .battle-arena-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center;
        }
        canvas { display: block; } /* Para que el canvas no tenga espacios extra */
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h1 style="font-family:'Bangers'; font-size: 50px; color: var(--gold);">MASHROYALE</h1>
        <p>CONECTANDO AL SERVIDOR...</p>
        <input type="text" id="user-name" placeholder="Tu Nombre de Guerrero">
        <button onclick="login()">EMPEZAR</button>
    </div>

    <header>
        <div id="display-name">JUGADOR</div>
        <div class="currency">
            <span style="color: var(--gold);">💰 <span id="gold-val">500</span></span>
            <span style="color: var(--diam);">🏆 <span id="cups-val">0</span></span>
        </div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div style="text-align:center; padding:50px 20px; background: linear-gradient(to bottom, #2980b9, #2c3e50); border-radius:20px; border:4px solid #fff;">
                <h1 id="arena-txt" style="font-family:'Bangers'; font-size:35px; margin:0; color:#fff">ESTADIO DUENDE</h1>
                <p style="color:#fff; font-size:18px;">ARENA <span id="arena-num">1</span></p>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:6px solid #d35400; padding:15px 50px; font-family:'Bangers'; font-size:35px; color:#fff; border-radius:15px; margin-top:20px;">¡BATALLA!</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <div class="section-title">Tu Mazo de Batalla</div>
            <div class="card-grid" id="deck-grid"></div>
            
            <div class="section-title">Colección y Mejoras</div>
            <div class="card-grid" id="collection-grid"></div>
        </div>

        <div id="view-pass" class="view">
            <h2 style="font-family:'Bangers'; text-align:center; font-size:30px; color:var(--gold);">PASE DE BATALLA</h2>
            <div class="sub-page active-view" style="padding:0">
                <div class="pass-row unlocked"><span>Nivel 1: ✅ 100 Oro</span></div>
                <div class="pass-row locked"><span>Nivel 2: 🔒 200 Oro</span></div>
                <div class="pass-row locked"><span>Nivel 3: 🔒 Cofre Gigante</span></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>MAZO</div>
        <div class="nav-item active-nav" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchTab('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas" class="battle-arena-container"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-bg"><div id="elixir-fill"></div></div>
        </div>
    </div>
</div>

<script>
    // --- DATOS DE CARTAS ---
    const CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", cost: 3, hp: 1400, dmg: 160, speed: 1.2, range: 45, model: "knight" },
        { id: 1, name: "Archeras", emoji: "🏹", cost: 3, hp: 600, dmg: 90, speed: 1.1, range: 200, model: "archer" },
        { id: 2, name: "Gigante", emoji: "🧔", cost: 5, hp: 3500, dmg: 210, speed: 0.8, range: 50, target: "tower", model: "giant" },
        { id: 3, name: "Mago", emoji: "🔥", cost: 5, hp: 700, dmg: 240, speed: 1.0, range: 190, model: "mage" },
        { id: 4, name: "Esqueleto", emoji: "💀", cost: 1, hp: 100, dmg: 40, speed: 1.3, range: 0, model: "skeleton" },
        { id: 5, name: "Flechas", emoji: "⬆️", cost: 3, type: "spell", effect: "area", dmg: 150, range: 100, model: "arrows" },
        { id: 6, name: "Bola de Fuego", emoji: "🔥", cost: 4, type: "spell", effect: "area", dmg: 400, range: 150, model: "fireball" },
        { id: 7, name: "Valquiria", emoji: "🛡️", cost: 4, hp: 1200, dmg: 150, speed: 1.1, range: 50, model: "valkyrie" },
        { id: 8, name: "Duende Lanza", emoji: "🪙", cost: 2, hp: 300, dmg: 80, speed: 1.2, range: 150, model: "spear" },
        { id: 9, name: "Pekka", emoji: "🤖", cost: 7, hp: 4000, dmg: 300, speed: 0.9, range: 50, model: "pekka" },
        { id: 10, name: "Dragón Bebé", emoji: "🐉", cost: 4, hp: 1200, dmg: 180, speed: 1.0, range: 180, model: "baby_dragon" },
        { id: 11, name: "Goblins", emoji: "🤏", cost: 2, hp: 200, dmg: 70, speed: 1.3, range: 0, model: "goblin" },
        { id: 12, name: "Montapuercos", emoji: "🐷", cost: 4, hp: 1500, dmg: 250, speed: 1.0, range: 50, target: "tower", model: "hog_rider" },
        { id: 13, name: "Príncipe", emoji: "🐎", cost: 5, hp: 1300, dmg: 280, speed: 1.2, range: 50, model: "prince" },
        { id: 14, name: "Bandida", emoji: "🗡️", cost: 3, hp: 1000, dmg: 200, speed: 1.2, range: 50, model: "bandit" },
        { id: 15, name: "Bruja", emoji: "🧙", cost: 5, hp: 700, dmg: 100, speed: 1.0, range: 190, model: "witch" },
        { id: 16, name: "Mortero", emoji: "💥", cost: 4, hp: 800, dmg: 150, speed: 0.5, range: 300, target: "ground", model: "mortar" },
        { id: 17, name: "Cañón", emoji: "💣", cost: 3, hp: 700, dmg: 120, speed: 0.8, range: 100, target: "ground", model: "cannon" },
        { id: 18, name: "Pandilla de Duendes", emoji: "👺", cost: 3, hp: 250, dmg: 70, speed: 1.3, range: 0, model: "goblin_gang" },
        { id: 19, name: "Gigante Noble", emoji: "👑", cost: 6, hp: 2200, dmg: 300, speed: 1.0, range: 50, model: "royal_giant" }
    ];

    const ARENA_THEMES = [
        { name: "Estadio Duende", min: 0, ground: 0x2ecc71, secondary: 0x27ae60 },
        { name: "Foso de Huesos", min: 400, ground: 0xbdc3c7, secondary: 0x95a5a6 },
        { name: "Coliseo Bárbaro", min: 800, ground: 0xe67e22, secondary: 0xd35400 },
        { name: "Valle de Hechizos", min: 1200, ground: 0x8e44ad, secondary: 0x6a2a81 },
        { name: "Montaña Helada", min: 1600, ground: 0x3498db, secondary: 0x2980b9 }
    ];

    let player = { name: "", gold: 500, trophies: 0, deck: [0, 1, 2, 3], lvls: {}, arena: 1 };
    let cardToPlay = null;
    let inBattle = false;

    // --- DATOS Y LOGIN ---
    function login() {
        const input = document.getElementById('user-name').value.trim();
        if(!input) return alert("Escribe tu nombre de guerrero.");
        player.name = input;
        const data = localStorage.getItem('mash_pro_final_' + input);
        if(data) {
            player = JSON.parse(data);
            // Asegurarse de que el mazo no tenga cartas inválidas si se actualiza el juego
            player.deck = player.deck.filter(id => CARDS.some(c => c.id === id));
            if (player.deck.length === 0) player.deck = [0, 1, 2, 3]; // Resetear si el mazo está vacío
        } else {
            // Inicializar niveles si es un jugador nuevo
            CARDS.forEach(c => player.lvls[c.id] = 1);
        }
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
        renderCards(); // Renderizar cartas al iniciar sesión
    }
    function save() { localStorage.setItem('mash_pro_final_' + player.name, JSON.stringify(player)); }

    // --- NAVEGACIÓN ---
    function switchTab(viewId, el) {
        if (inBattle) return;
        document.querySelectorAll('.view').forEach(p => p.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('view-' + viewId).classList.add('active-view');
        el.classList.add('active-nav');
        if (viewId === 'cards') renderCards();
        if (viewId === 'home') updateArenaInfo();
    }

    function renderCards() {
        const deckGrid = document.getElementById('deck-grid');
        const collectionGrid = document.getElementById('collection-grid');
        deckGrid.innerHTML = '';
        collectionGrid.innerHTML = '';

        // Renderizar cartas del mazo
        player.deck.forEach(id => {
            const card = CARDS.find(c => c.id === id);
            if (card) deckGrid.innerHTML += createCardHTML(card, true);
        });

        // Renderizar todas las cartas de la colección
        CARDS.forEach(c => {
            collectionGrid.innerHTML += createCardHTML(c, false);
        });
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        const isLocked = lvl > calculateMaxLevelForArena(player.arena) && !isDeck; // Lógica simple de bloqueo por arena
        
        return `<div class="card ${isDeck ? 'in-deck' : ''} ${isLocked ? 'locked' : ''}" onclick="${isLocked ? 'alert(\"Desbloquea esta carta en una arena superior!\")' : 'openUpgrade(' + c.id + ')'}">
                    <div class="card-cost">💧${c.cost}</div>
                    <div style="font-size:30px">${c.emoji}</div>
                    <div class="card-name">${c.name.toUpperCase()}</div>
                    <div class="lvl-badge">Lv ${lvl}</div>
                </div>`;
    }

    function updateArenaInfo() {
        let currentArena = 1;
        let arenaName = "El Prado";
        for (let i = ARENA_THEMES.length - 1; i >= 0; i--) {
            if (player.trophies >= ARENA_THEMES[i].min) {
                currentArena = i + 1;
                arenaName = ARENA_THEMES[i].name;
                break;
            }
        }
        player.arena = currentArena;
        document.getElementById('arena-txt').innerText = arenaName.toUpperCase();
        document.getElementById('arena-num').innerText = currentArena;
    }

    // --- MEJORA DE CARTAS ---
    function openUpgrade(cardId) {
        if (inBattle) return;
        const card = CARDS.find(c => c.id === cardId);
        const currentLevel = player.lvls[cardId] || 1;
        const goldCost = calculateUpgradeCost(currentLevel);
        const cardCountNeeded = calculateCardCountNeeded(currentLevel); // Simplificado

        // Aquí iría una ventana modal o un panel para la mejora
        alert(`Mejorar ${card.name} a Nivel ${currentLevel + 1}?\nCosto: ${goldCost} Oro\n(Necesitas ${cardCountNeeded} cartas)`);
        
        // Simulación de mejora
        if (player.gold >= goldCost) {
            player.gold -= goldCost;
            player.lvls[cardId] = currentLevel + 1;
            save();
            updateUI();
            renderCards();
        } else {
            alert("No tienes suficiente oro.");
        }
    }

    function calculateUpgradeCost(level) {
        // Costos de ejemplo, se pueden ajustar para que sean más parecidos a CR
        return level * 100 + 50;
    }

    function calculateCardCountNeeded(level) {
        // Cantidad de cartas necesarias para la mejora
        return level * 5;
    }

    function calculateMaxLevelForArena(arena) {
        // Niveles máximos permitidos por arena (simplificado)
        switch(arena) {
            case 1: return 5;
            case 2: return 6;
            case 3: return 7;
            case 4: return 8;
            case 5: return 9;
            default: return 10;
        }
    }


    // --- BATALLA 3D (MOTOR AVANZADO + ARENA ARREGLADA) ---
    let scene, camera, renderer, clock, elixir = 0;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let towers = [], units = [];
    let models = {}; // Para cargar modelos 3D

    // Función para cargar modelos (simplificada con primitivas por ahora)
    async function loadModels() {
        // Aquí iría la carga de modelos GLTF/FBX reales
        // Por ahora, usaremos primitivas y las mapearemos
        models.knight = createKnightMesh;
        models.archer = createArcherMesh;
        models.giant = createGiantMesh;
        models.mage = createMageMesh;
        models.skeleton = createSkeletonMesh;
        models.arrows = createArrowsEffect;
        models.fireball = createFireballEffect;
        models.valkyrie = createValkyrieMesh;
        models.spear = createSpearGoblinMesh;
        models.pekka = createPekkaMesh;
        models.baby_dragon = createBabyDragonMesh;
        models.goblin = createGoblinMesh;
        models.hog_rider = createHogRiderMesh;
        models.prince = createPrinceMesh;
        models.bandit = createBanditMesh;
        models.witch = createWitchMesh;
        models.mortar = createMortarMesh;
        models.cannon = createCannonMesh;
        models.goblin_gang = createGoblinGangMesh;
        models.royal_giant = createRoyalGiantMesh;
    }

    function openBattle() {
        if(player.deck.length < 4) {
            alert("Tu mazo debe tener al menos 4 cartas.");
            return;
        }
        document.getElementById('battle-view').style.display = 'block';
        inBattle = true;
        init3DArena();
    }

    function init3DArena() {
        scene = new THREE.Scene();
        const theme = ARENA_THEMES.find(t => player.trophies >= t.min) || ARENA_THEMES[0];
        scene.background = new THREE.Color(theme.ground);
        
        const canvasContainer = document.getElementById('battle-canvas');
        const width = canvasContainer.clientWidth;
        const height = canvasContainer.clientHeight;

        camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        canvasContainer.innerHTML = ''; // Limpiar contenido previo
        canvasContainer.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(10, 15, 10); scene.add(sun);

        camera.position.set(0, 25, 30); // Cámara más elevada para mejor vista
        camera.lookAt(0, 0, -5); // Mirando hacia el centro del campo

        // --- ARREGLO DE LA ARENA (GRID + TEXTURA + DETALLE) ---
        const arenaSize = 24; // Campo más amplio
        const divisions = 12;
        const gridHelper = new THREE.GridHelper(arenaSize, divisions, 0x000000, 0x000000);
        gridHelper.position.y = 0.05;
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Terreno base con textura
        const groundTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg'); // Textura de césped
        groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(arenaSize / 2, arenaSize / 2);
        const groundMaterial = new THREE.MeshLambertMaterial({ map: groundTexture });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(arenaSize, arenaSize), groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Río y Puentes (más estilizado)
        const riverWidth = 4;
        const riverLength = arenaSize * 0.6;
        const river = new THREE.Mesh(new THREE.PlaneGeometry(riverWidth, riverLength), new THREE.MeshLambertMaterial({ color: 0x3498db, opacity: 0.7, transparent: true }));
        river.rotation.x = -Math.PI / 2; river.position.y = 0.01;
        scene.add(river);

        const bridgeLength = 3;
        const bridgeHeight = 0.3;
        const bridgeMaterial = new THREE.MeshLambertMaterial({ color: 0x8e6029 });
        createBridge(-riverWidth / 2 - bridgeLength / 2, 0, bridgeMaterial); // Puente superior
        createBridge(riverWidth / 2 + bridgeLength / 2, 0, bridgeMaterial); // Puente inferior
        createBridge(0, arenaSize * 0.3, bridgeMaterial); // Puente central superior
        createBridge(0, -arenaSize * 0.3, bridgeMaterial); // Puente central inferior


        // Torres (Detalladas y Fotorrealistas) - Posiciones ajustadas
        const towerScale = 2.5;
        spawnTower(0, arenaSize * 0.4, theme.ground, towerScale * 1.2); // Rey Aliado
        spawnTower(-arenaSize * 0.25, arenaSize * 0.2, theme.ground, towerScale); // Princesa L
        spawnTower(arenaSize * 0.25, arenaSize * 0.2, theme.ground, towerScale);  // Princesa R
        
        spawnTower(0, -arenaSize * 0.4, 0xc0392b, towerScale * 1.2); // Rey Enemigo
        spawnTower(-arenaSize * 0.25, -arenaSize * 0.2, 0xc0392b, towerScale); // Princesa L Enemiga
        spawnTower(arenaSize * 0.25, -arenaSize * 0.2, 0xc0392b, towerScale);  // Princesa R Enemiga

        loadModels().then(() => {
            renderBattleHand();
            renderer.domElement.addEventListener('click', deployUnit3D);
            battleLoop();
        });
    }

    function createBridge(x, z, material) {
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(riverWidth, bridgeHeight, bridgeLength), material);
        bridge.position.set(x, bridgeHeight / 2 + 0.05, z);
        scene.add(bridge);
    }

    function spawnTower(x, z, color, scale) {
        const group = new THREE.Group();
        
        // Base cilíndrica
        const base = new THREE.Mesh(new THREE.CylinderGeometry(scale * 0.8, scale * 1.0, scale * 2.0, 8), new THREE.MeshLambertMaterial({color: color}));
        base.position.y = scale;
        group.add(base);

        // Techo cónico
        const roof = new THREE.Mesh(new THREE.ConeGeometry(scale * 0.7, scale * 1.5, 8), new THREE.MeshLambertMaterial({color: 0x333333}));
        roof.position.y = scale * 2.5;
        group.add(roof);

        // Pináculo
        const spire = new THREE.Mesh(new THREE.CylinderGeometry(scale * 0.1, scale * 0.2, scale * 0.8, 4), new THREE.MeshLambertMaterial({color: 0xaaaaaa}));
        spire.position.y = scale * 3.5;
        group.add(spire);

        group.position.set(x, 0, z);
        scene.add(group);
        towers.push({mesh: group, hp: 2000 * scale}); // HP escalado
    }

    // --- FUNCIONES DE MODELOS 3D (PRIMITIVAS POR AHORA) ---
    function createKnightMesh() { return new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5, 4), new THREE.MeshPhongMaterial({color: 0x3498db})); }
    function createArcherMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 4), new THREE.MeshPhongMaterial({color: 0x2ecc71})); }
    function createGiantMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.0, 2.0, 8), new THREE.MeshPhongMaterial({color: 0x2c3e50})); }
    function createMageMesh() { return new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshPhongMaterial({color: 0xe74c3c})); }
    function createSkeletonMesh() { return new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshPhongMaterial({color: 0xbdc3c7})); }
    function createValkyrieMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 1.8, 6), new THREE.MeshPhongMaterial({color: 0x9b59b6})); }
    function createSpearGoblinMesh() { return new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.0, 4), new THREE.MeshPhongMaterial({color: 0xf1c40f})); }
    function createPekkaMesh() { return new THREE.Mesh(new THREE.BoxGeometry(1.0, 2.5, 1.0), new THREE.MeshPhongMaterial({color: 0x34495e})); }
    function createBabyDragonMesh() { return new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshPhongMaterial({color: 0xe67e22})); }
    function createGoblinMesh() { return new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), new THREE.MeshPhongMaterial({color: 0x27ae60})); }
    function createHogRiderMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 1.5, 8), new THREE.MeshPhongMaterial({color: 0xd35400})); }
    function createPrinceMesh() { return new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.6, 4), new THREE.MeshPhongMaterial({color: 0x2980b9})); }
    function createBanditMesh() { return new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.4, 4), new THREE.MeshPhongMaterial({color: 0x8c452a})); }
    function createWitchMesh() { return new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshPhongMaterial({color: 0x9c88ff})); }
    function createMortarMesh() { return new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.8, 1.0), new THREE.MeshPhongMaterial({color: 0x555555})); }
    function createCannonMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.5, 8), new THREE.MeshPhongMaterial({color: 0x7f8c8d})); }
    function createGoblinGangMesh() { return new THREE.Group().add(createGoblinMesh(), createSpearGoblinMesh()); } // Agrupar varios goblins
    function createRoyalGiantMesh() { return new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1.1, 2.2, 8), new THREE.MeshPhongMaterial({color: 0x2e86c1})); }

    // Efectos de Hechizos
    function createArrowsEffect(x, z) {
        const group = new THREE.Group();
        for (let i = 0; i < 5; i++) {
            const arrow = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.1), new THREE.MeshBasicMaterial({color: 0x3498db}));
            arrow.position.set(Math.random() * 10 - 5, 5 + i * 2, Math.random() * 10 - 5);
            arrow.rotation.x = Math.random() * Math.PI / 4;
            group.add(arrow);
        }
        group.position.set(x, 5, z);
        scene.add(group);
        // Animación simple de caída
        const animateArrows = () => {
            group.children.forEach(arrow => {
                arrow.position.y -= 0.1;
                if (arrow.position.y < 0) scene.remove(arrow);
            });
            if (group.children.length > 0) requestAnimationFrame(animateArrows);
            else scene.remove(group);
        };
        animateArrows();
    }

    function createFireballEffect(x, z) {
        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 });
        const fireball = new THREE.Mesh(geometry, material);
        fireball.position.set(x, 10, z);
        scene.add(fireball);

        // Animación de explosión
        const animateFireball = () => {
            fireball.scale.x += 0.2;
            fireball.scale.y += 0.2;
            fireball.scale.z += 0.2;
            fireball.material.opacity -= 0.02;
            if (fireball.scale.x < 5) requestAnimationFrame(animateFireball);
            else scene.remove(fireball);
        };
        animateFireball();
    }

    // --- LÓGICA DE BATALLA ---
    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = ''; // Limpiar la mano actual
        player.deck.forEach(id => {
            const c = CARDS.find(card => card.id === id);
            if (c) {
                const cardElement = document.createElement('div');
                cardElement.classList.add('mini-card');
                cardElement.innerHTML = `
                    <span style="font-size:28px">${c.emoji}</span>
                    <span style="font-weight:900">💧${c.cost}</span>
                `;
                cardElement.onclick = () => selectCard(id, cardElement);
                hand.appendChild(cardElement);
            }
        });
    }

    function selectCard(id, el) {
        cardToPlay = CARDS.find(c => c.id === id);
        // Verificar si hay suficiente elixir
        if (elixir < cardToPlay.cost) {
            alert("No tienes suficiente Elixir.");
            cardToPlay = null; // Deseleccionar si no hay elixir
            el.classList.remove('active-play');
            return;
        }
        document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('active-play'));
        el.classList.add('active-play');
    }

    function deployUnit3D(event) {
        if (!cardToPlay) return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        
        // Intersecar con el plano del suelo
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Plano horizontal en y=0
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersectPoint);

        if (intersectPoint) {
            let pt = intersectPoint;
            const arenaSize = 24;
            const margin = 3; // Margen desde los bordes

            // Desplegar solo en tu lado del campo (z > 0) y dentro de los límites
            if (pt.z > margin && pt.z < arenaSize / 2 - margin && Math.abs(pt.x) < arenaSize / 2 - margin) {
                if (elixir >= cardToPlay.cost) {
                    elixir -= cardToPlay.cost;
                    
                    let unitMesh = null;
                    if (cardToPlay.model && models[cardToPlay.model]) {
                        unitMesh = models[cardToPlay.model]();
                    } else {
                        // Modelo por defecto si no se encuentra
                        unitMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshPhongMaterial({color: 0xff00ff}));
                    }

                    unitMesh.position.set(pt.x, unitMesh.geometry.parameters.height ? unitMesh.geometry.parameters.height / 2 : 0.5, pt.z); // Ajuste de altura
                    scene.add(unitMesh);
                    
                    units.push({
                        mesh: unitMesh, 
                        card: cardToPlay, 
                        hp: (cardToPlay.hp || 500) * (player.lvls[cardToPlay.id] || 1) / 2, // HP escalado por nivel
                        target: null,
                        team: "ally" // Aliado
                    });

                    cardToPlay = null; // Deseleccionar carta
                    document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('active-play'));
                } else {
                    alert("No tienes suficiente Elixir.");
                }
            }
        }
    }

    // Función para simular el movimiento y ataque de las unidades
    function updateUnits() {
        const arenaSize = 24;
        const towersAlly = towers.filter(t => t.hp > 0); // Torres aliadas
        const towersEnemy = towers.filter(t => t.hp > 0 && t.mesh.position.z < 0); // Torres enemigas

        units.forEach(unit => {
            if (unit.hp <= 0) {
                scene.remove(unit.mesh);
                units = units.filter(u => u.hp > 0);
                return;
            }

            // Buscar el objetivo más cercano (prioridad: torre enemiga, luego unidad enemiga)
            let closestTarget = null;
            let minDistance = Infinity;

            // Buscar torres enemigas
            towersEnemy.forEach(tower => {
                const dist = unit.mesh.position.distanceTo(tower.mesh.position);
                if (dist < minDistance && dist < (unit.card.range || 50)) { // Considerar rango
                    minDistance = dist;
                    closestTarget = tower;
                }
            });

            // Si no hay torre enemiga o está fuera de rango, buscar unidades enemigas
            if (!closestTarget) {
                const enemyUnits = units.filter(u => u.team === "enemy" && u.hp > 0);
                enemyUnits.forEach(enemy => {
                    const dist = unit.mesh.position.distanceTo(enemy.mesh.position);
                    if (dist < minDistance && dist < (unit.card.range || 50)) {
                        minDistance = dist;
                        closestTarget = enemy;
                    }
                });
            }
            
            unit.target = closestTarget;

            // Moverse hacia el objetivo o hacia adelante si no hay objetivo
            if (unit.target) {
                const direction = new THREE.Vector3().subVectors(unit.target.mesh.position, unit.mesh.position).normalize();
                const distanceToTarget = unit.mesh.position.distanceTo(unit.target.mesh.position);

                if (distanceToTarget < (unit.card.range || 1)) { // Si está lo suficientemente cerca para atacar
                    // Atacar
                    if (unit.attackCooldown === undefined || unit.attackCooldown <= 0) {
                        const damage = (unit.card.dmg || 50) * (player.lvls[unit.card.id] || 1) / 2; // Daño escalado
                        if (unit.target.hp !== undefined) { // Si es una torre o unidad con HP
                            unit.target.hp -= damage;
                            if (unit.target.hp <= 0) {
                                // Si el objetivo es destruido, eliminarlo de la escena y de las listas
                                if (unit.target.mesh) scene.remove(unit.target.mesh);
                                if (unit.target.children) unit.target.children.forEach(child => scene.remove(child)); // Para grupos
                                towersEnemy.splice(towersEnemy.indexOf(unit.target), 1);
                                units = units.filter(u => u.hp > 0);
                                // Comprobar condición de victoria/derrota
                                if (towersEnemy.length === 0) finishBattle(true);
                            }
                        }
                        unit.attackCooldown = 1 / unit.card.speed; // Cooldown basado en la velocidad de ataque
                    } else {
                        unit.attackCooldown -= 0.05; // Reducir cooldown en cada frame (ajustar valor)
                    }
                } else {
                    // Moverse hacia el objetivo
                    const moveSpeed = unit.card.speed * 0.1; // Velocidad de movimiento escalada
                    unit.mesh.position.add(direction.multiplyScalar(moveSpeed));
                    // Mantener la altura
                    unit.mesh.position.y = unit.mesh.geometry.parameters.height ? unit.mesh.geometry.parameters.height / 2 : 0.5;
                }
            } else {
                // Si no hay objetivo, avanzar hacia el campo enemigo
                const direction = new THREE.Vector3(0, 0, -1); // Avanzar hacia abajo en el eje Z
                const moveSpeed = unit.card.speed * 0.05;
                unit.mesh.position.add(direction.multiplyScalar(moveSpeed));
                unit.mesh.position.y = unit.mesh.geometry.parameters.height ? unit.mesh.geometry.parameters.height / 2 : 0.5;

                // Si cruza la línea central, intentar atacar la torre enemiga más cercana
                if (unit.mesh.position.z < -1) {
                    const closestEnemyTower = towersEnemy[0]; // Tomar la primera disponible
                    if (closestEnemyTower) {
                        unit.target = closestEnemyTower;
                    } else {
                        // Si no hay torres enemigas, la batalla termina (victoria)
                        finishBattle(true);
                    }
                }
            }
        });
    }


    function battleLoop() {
        if (!inBattle) return;
        requestAnimationFrame(battleLoop);

        elixir = Math.min(10, elixir + 0.015); // Elixir regenera más rápido
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

        updateUnits(); // Actualizar estado de las unidades
        renderer.render(scene, camera);
    }

    function finishBattle(win) {
        inBattle = false;
        const cupReward = 30;
        const goldReward = Math.floor(Math.random() * 100) + 50;
        
        alert(win ? `¡VICTORIA!\n+${cupReward} Copas\n+${goldReward} Oro` : `¡DERROTA!\n-10 Copas`);
        
        if (win) {
            player.trophies += cupReward;
            player.gold += goldReward;
        } else {
            player.trophies = Math.max(0, player.trophies - 10);
        }
        
        save();
        updateUI();
        updateArenaInfo(); // Actualizar información de arena si las copas cambiaron
        document.getElementById('battle-view').style.display = 'none';
        // Limpiar escena y listeners
        renderer.domElement.removeEventListener('click', deployUnit3D);
        scene = null; renderer = null; camera = null;
    }

    function updateUI() {
        document.getElementById('display-name').innerText = player.name.toUpperCase();
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
    }

    // Inicializar la interfaz al cargar la página
    updateUI();
    updateArenaInfo(); // Mostrar arena correcta al inicio si ya hay datos guardados
</script>
