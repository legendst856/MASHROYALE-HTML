<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale 3D Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@800&display=swap');
        
        :root {
            --bronz: #cd7f32; --silv: #bdc3c7; --gold: #fbc531; --diam: #3498db;
            --purple: #9c88ff; --dark: #1e272e; --path: #f1c40f;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--dark); margin: auto; display: flex; flex-direction: column; }

        /* HEADER */
        header { 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #2c3e50; border-bottom: 3px solid var(--gold); z-index: 100; 
        }
        #display-name { 
            font-family: 'Bangers'; font-size: 26px; color: #fff; 
            text-shadow: 2px 2px #000; background: rgba(0,0,0,0.5); padding: 2px 12px; border-radius: 8px;
        }
        .currency { display: flex; gap: 12px; font-weight: 800; font-size: 14px; }

        /* LOGIN */
        #login-screen { position: absolute; inset: 0; background: #2c3e50; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border-radius: 10px; border: none; width: 70%; margin: 15px 0; font-size: 20px; text-align: center; font-family: 'Bangers'; }

        /* NAV & VIEWS */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }
        nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: #1a1a1a; display: flex; border-top: 3px solid #000; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7f8c8d; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); background: rgba(255,255,255,0.05); }

        /* CARDS & UPGRADES */
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .card { 
            background: #34495e; border-radius: 10px; padding: 5px; text-align: center; 
            position: relative; border: 2px solid #555; cursor: pointer;
        }
        .card.in-deck { border-color: #fff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .rare-bronz { border-bottom: 4px solid var(--bronz); }
        .rare-silv { border-bottom: 4px solid var(--silv); }
        .rare-gold { border-bottom: 4px solid var(--gold); }
        .rare-diam { border-bottom: 4px solid var(--diam); }
        .lvl-tag { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: 900; }

        /* MODAL */
        #card-modal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: #2f3640; border-radius: 20px; border: 4px solid var(--gold);
            z-index: 6000; padding: 20px; text-align: center;
        }

        /* BATTLE ARENA (LA IMAGEN) */
        #battle-view { display: none; position: absolute; inset: 0; z-index: 4000; background: #000; }
        #ui-battle { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; box-sizing: border-box; }
        .hand { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .mini-card { 
            width: 65px; height: 85px; background: #2c3e50; border-radius: 8px; border: 2px solid #fff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .mini-card.selected { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        .elixir-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #000; }
        #elixir-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.1s linear; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h1 style="font-family:'Bangers'; font-size: 50px; color: var(--gold); margin: 0;">MASHROYALE</h1>
        <input type="text" id="user-name" placeholder="TU NOMBRE">
        <button onclick="login()" style="background:var(--gold); border:none; padding:15px 50px; border-radius:12px; font-family:'Bangers'; font-size:24px; cursor:pointer;">JUGAR</button>
    </div>

    <header>
        <div id="display-name">SAMUEL</div>
        <div class="currency">
            <span>💰 <span id="gold-val">1000</span></span>
            <span>🏆 <span id="cups-val">0</span></span>
        </div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div style="text-align:center; padding:40px 20px; background: linear-gradient(to bottom, #27ae60, #2ecc71); border-radius:20px; border:4px solid #fff; margin-top:20px;">
                <h1 id="arena-txt" style="font-family:'Bangers'; font-size:35px; margin:0;">ARENA 1</h1>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:6px solid #d35400; padding:15px 50px; font-family:'Bangers'; font-size:35px; color:#fff; border-radius:15px; margin-top:20px; cursor:pointer;">BATALLA</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <h2 style="font-family:'Bangers'; color:var(--gold);">MAZO PRINCIPAL</h2>
            <div class="card-grid" id="deck-grid"></div>
            <h2 style="font-family:'Bangers'; color:var(--gold); margin-top:20px;">COLECCIÓN</h2>
            <div class="card-grid" id="collection-grid"></div>
        </div>

        <div id="view-pass" class="view">
            <h2 style="font-family:'Bangers'; text-align:center;">PASE DE BATALLA</h2>
            <div id="pass-container"></div>
        </div>
    </div>

    <div id="card-modal">
        <h2 id="modal-name" style="font-family:'Bangers';"></h2>
        <div id="modal-emoji" style="font-size:60px"></div>
        <p id="modal-info"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="useCard()" style="background:var(--diam); border:none; padding:10px 20px; border-radius:8px; color:#fff; font-weight:800;">USAR</button>
            <button id="btn-up" onclick="upgradeCard()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:8px; font-weight:800;">MEJORAR</button>
        </div>
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#aaa; text-decoration:underline;">Cerrar</button>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>CARTAS</div>
        <div class="nav-item active" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchTab('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-bar"><div id="elixir-fill"></div></div>
        </div>
    </div>
</div>

<script>
    const ALL_CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", rarity: "bronz", cost: 3, hp: 1400, dmg: 160 },
        { id: 1, name: "Archeras", emoji: "🏹", rarity: "bronz", cost: 3, hp: 600, dmg: 90 },
        { id: 2, name: "Bombardero", emoji: "💣", rarity: "bronz", cost: 2, hp: 500, dmg: 200 },
        { id: 3, name: "Flechas", emoji: "💘", rarity: "bronz", cost: 3, hp: 1, dmg: 300 },
        { id: 4, name: "Gigante", emoji: "🧔", rarity: "silv", cost: 5, hp: 3500, dmg: 210 },
        { id: 5, name: "Mosquetera", emoji: "👩‍🚀", rarity: "silv", cost: 4, hp: 800, dmg: 200 },
        { id: 6, name: "Mini PEKKA", emoji: "🤖", rarity: "silv", cost: 4, hp: 1100, dmg: 600 },
        { id: 7, name: "Montapuerco", emoji: "🐗", rarity: "silv", cost: 4, hp: 1500, dmg: 300 },
        { id: 8, name: "Valquiria", emoji: "🪓", rarity: "silv", cost: 4, hp: 1500, dmg: 220 },
        { id: 9, name: "Bebé Dragón", emoji: "🐉", rarity: "gold", cost: 4, hp: 1100, dmg: 100 },
        { id: 10, name: "Príncipe", emoji: "🏇", rarity: "gold", cost: 5, hp: 1800, dmg: 350 },
        { id: 11, name: "Mago", emoji: "🔥", rarity: "gold", cost: 5, hp: 700, dmg: 240 },
        { id: 12, name: "P.E.K.K.A", emoji: "🦾", rarity: "gold", cost: 7, hp: 3800, dmg: 800 },
        { id: 13, name: "Globo", emoji: "🎈", rarity: "gold", cost: 5, hp: 1400, dmg: 900 },
        { id: 14, name: "Chispitas", emoji: "⚡", rarity: "diam", cost: 6, hp: 1200, dmg: 1200 },
        { id: 15, name: "Mago Eléct.", emoji: "🌩️", rarity: "diam", cost: 4, hp: 700, dmg: 100 },
        { id: 16, name: "Megacaballero", emoji: "🛡️", rarity: "diam", cost: 7, hp: 3500, dmg: 250 },
        { id: 17, name: "Minero", emoji: "⛏️", rarity: "diam", cost: 3, hp: 1200, dmg: 120 },
        { id: 18, name: "Mago de Hielo", emoji: "❄️", rarity: "diam", cost: 3, hp: 800, dmg: 80 },
        { id: 19, name: "Tronco", emoji: "🪵", rarity: "gold", cost: 2, hp: 1, dmg: 280 }
    ];

    let player = { name: "", gold: 1500, trophies: 0, deck: [0, 4, 10, 13], lvls: {} };
    let selectedId = null;
    let cardToDeploy = null;

    // SISTEMA DE DATOS
    function login() {
        const input = document.getElementById('user-name').value;
        if(!input) return;
        player.name = input;
        const saved = localStorage.getItem('mash_final_' + input);
        if(saved) player = JSON.parse(saved);
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
    }
    function save() { localStorage.setItem('mash_final_' + player.name, JSON.stringify(player)); }

    function switchTab(view, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active-view');
        el.classList.add('active');
        if(view === 'cards') renderCards();
    }

    function renderCards() {
        document.getElementById('deck-grid').innerHTML = player.deck.map(id => createCardHTML(ALL_CARDS[id], true)).join('');
        document.getElementById('collection-grid').innerHTML = ALL_CARDS.map(c => createCardHTML(c, false)).join('');
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        return `<div class="card rare-${c.rarity} ${isDeck ? 'in-deck' : ''}" onclick="openModal(${c.id})">
            <div style="font-size:28px">${c.emoji}</div>
            <div style="font-size:9px; font-weight:800">${c.name.toUpperCase()}</div>
            <div class="lvl-tag">Lv ${lvl}</div>
        </div>`;
    }

    function openModal(id) {
        selectedId = id;
        const c = ALL_CARDS[id];
        const lvl = player.lvls[id] || 1;
        document.getElementById('modal-name').innerText = c.name;
        document.getElementById('modal-emoji').innerText = c.emoji;
        document.getElementById('modal-info').innerText = `Daño: ${Math.floor(c.dmg*(1+lvl*0.1))} | Vida: ${Math.floor(c.hp*(1+lvl*0.1))}`;
        document.getElementById('btn-up').innerText = `MEJORAR 💰 ${lvl * 300}`;
        document.getElementById('card-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('card-modal').style.display = 'none'; }

    function useCard() {
        if(!player.deck.includes(selectedId) && player.deck.length < 4) player.deck.push(selectedId);
        else if(player.deck.includes(selectedId)) player.deck = player.deck.filter(i => i !== selectedId);
        save(); renderCards(); closeModal();
    }

    function upgradeCard() {
        const lvl = player.lvls[selectedId] || 1;
        if(player.gold >= lvl*300) {
            player.gold -= lvl*300;
            player.lvls[selectedId] = lvl + 1;
            save(); updateUI(); renderCards(); openModal(selectedId);
        }
    }

    function updateUI() {
        document.getElementById('display-name').innerText = player.name.toUpperCase();
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
    }

    // --- MOTOR BATTLE 3D (CLASH STYLE) ---
    let scene, camera, renderer, elixir = 0;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();

    function openBattle() {
        if(player.deck.length < 4) return alert("Mazo incompleto");
        document.getElementById('battle-view').style.display = 'block';
        init3D();
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x27ae60);
        camera = new THREE.PerspectiveCamera(60, 480/800, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('app-container').clientWidth, window.innerHeight - 150);
        document.getElementById('battle-canvas').innerHTML = "";
        document.getElementById('battle-canvas').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        camera.position.set(0, 30, 25);
        camera.lookAt(0, 0, -5);

        // ARENA: Hierba, Río y Puentes
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(22, 44), new THREE.MeshLambertMaterial({color: 0x2ecc71}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        const river = new THREE.Mesh(new THREE.PlaneGeometry(22, 4), new THREE.MeshLambertMaterial({color: 0x3498db}));
        river.rotation.x = -Math.PI/2;
        river.position.y = 0.05;
        scene.add(river);

        // Puentes
        createBridge(-6); createBridge(6);

        // Torres (3 por bando)
        spawnTower(0, 18, 0x2980b9, 3); // Rey Aliado
        spawnTower(-7, 12, 0x2980b9, 2); // Princesa L
        spawnTower(7, 12, 0x2980b9, 2);  // Princesa R

        spawnTower(0, -18, 0xc0392b, 3); // Rey Enemigo
        spawnTower(-7, -12, 0xc0392b, 2); 
        spawnTower(7, -12, 0xc0392b, 2);

        renderBattleHand();
        renderer.domElement.addEventListener('click', onFieldClick);
        battleLoop();
    }

    function createBridge(x) {
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 5), new THREE.MeshLambertMaterial({color: 0xbdc3c7}));
        bridge.position.set(x, 0.1, 0);
        scene.add(bridge);
    }

    function spawnTower(x, z, color, size) {
        const geo = new THREE.CylinderGeometry(size*0.6, size*0.7, size*1.5, 8);
        const mat = new THREE.MeshLambertMaterial({color: color});
        const tower = new THREE.Mesh(geo, mat);
        tower.position.set(x, size*0.75, z);
        scene.add(tower);
    }

    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = player.deck.map(id => {
            const c = ALL_CARDS[id];
            return `<div class="mini-card" onclick="selectCardToDeploy(${id}, this)">
                <span style="font-size:24px">${c.emoji}</span>
                <span style="color:var(--purple); font-weight:900">💧${c.cost}</span>
            </div>`;
        }).join('');
    }

    function selectCardToDeploy(id, el) {
        cardToDeploy = ALL_CARDS[id];
        document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('selected'));
        el.classList.add('selected');
    }

    function onFieldClick(event) {
        if(!cardToDeploy || elixir < cardToDeploy.cost) return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);

        if(intersects.length > 0) {
            let pt = intersects[0].point;
            if(pt.z > 2) { // Solo desplegar en tu campo
                elixir -= cardToDeploy.cost;
                spawn3DUnit(pt.x, pt.z, cardToDeploy);
                cardToDeploy = null;
                document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('selected'));
            }
        }
    }

    function spawn3DUnit(x, z, card) {
        // Personaje 3D Voxel (Cuerpo y Cabeza)
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 1.2), new THREE.MeshLambertMaterial({color: 0x3498db}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshLambertMaterial({color: 0xffdbac}));
        head.position.y = 1.3;
        group.add(body); group.add(head);
        group.position.set(x, 0.9, z);
        scene.add(group);

        const move = () => {
            group.position.z -= 0.1;
            if(group.position.z > -18) requestAnimationFrame(move);
            else { scene.remove(group); win(); }
        };
        move();
    }

    function win() {
        alert("¡TORRE DESTRUIDA!");
        player.trophies += 30; player.gold += 150;
        document.getElementById('battle-view').style.display = 'none';
        save(); updateUI();
    }

    function battleLoop() {
        if(document.getElementById('battle-view').style.display === 'none') return;
        requestAnimationFrame(battleLoop);
        elixir = Math.min(10, elixir + 0.015);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
        renderer.render(scene, camera);
    }

    updateUI();
</script>
</body>
</html>
