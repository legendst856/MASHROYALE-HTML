<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale Ultra Arena 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        
        :root {
            --bronz: #cd7f32; --silv: #bdc3c7; --gold: #fbc531; --diam: #3498db;
            --purple: #9c88ff; --dark: #1e272e;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--bg); border-left: 2px solid #333; border-right: 2px solid #333; }

        /* HEADER MEJORADO (LEGIBLE) */
        header { 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); border-bottom: 3px solid var(--gold); z-index: 100; 
        }
        #display-name { 
            font-family: 'Bangers'; font-size: 24px; color: #fff; 
            text-shadow: 2px 2px 0px #000; background: rgba(0,0,0,0.4); padding: 2px 12px; border-radius: 8px;
        }
        .currency { display: flex; gap: 12px; font-weight: 800; font-size: 14px; }

        /* LOGIN */
        #login-screen { position: absolute; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 15px; border-radius: 10px; border: none; width: 80%; margin: 15px 0; font-size: 18px; text-align: center; }

        /* NAVEGACIÓN Y PÁGINAS */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view { display: none; padding: 15px; box-sizing: border-box; z-index: 10; }
        .active-view { display: block; }

        /* CARTAS Y MEJORAS UNIDAS */
        .section-title { font-family: 'Bangers'; font-size: 24px; color: var(--gold); margin: 15px 0 10px 0; border-bottom: 2px solid #444; }
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .card { 
            background: #353b48; border-radius: 8px; padding: 5px; text-align: center; 
            position: relative; border: 2px solid #555; transition: 0.2s; cursor: pointer;
        }
        .card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .card.selected { border-color: var(--gold); background: #4b6584; }
        .card-cost { position: absolute; top: -5px; left: -5px; background: var(--purple); width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .lvl-badge { position: absolute; bottom: -5px; right: -5px; background: #fff; color: #000; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 800; }

        /* PASE ROYAL */
        .pass-row { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* NAV INFERIOR */
        nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: #2f3640; display: flex; border-top: 3px solid #111; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #718093; font-weight: 800; }
        .nav-item.active-nav { color: var(--gold); background: rgba(255,255,255,0.05); }

        /* --- BATALLA 3D (MEJORADA - IDENTICA A CR) --- */
        #battle-view { display: none; position: absolute; inset: 0; z-index: 4000; background: #000; }
        #ui-battle { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 10px; box-sizing: border-box; pointer-events: auto; }
        .hand { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .mini-card { width: 65px; height: 85px; background: #2c3e50; border-radius: 8px; border: 2px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .mini-card.active-play { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        .elixir-bg { height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #000; }
        #elixir-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.1s linear; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h1 style="font-family:'Bangers'; font-size: 50px; color: var(--gold);">MASHROYALE</h1>
        <p>CONECTANDO AL SERVIDOR...</p>
        <input type="text" id="user-name" placeholder="Tu Nombre de Guerrero">
        <button onclick="login()" style="background:var(--gold); border:none; padding:15px 50px; border-radius:10px; font-family:'Bangers'; font-size:24px; cursor:pointer;">EMPEZAR</button>
    </div>

    <header>
        <div id="display-name">JUGADOR</div>
        <div class="currency">
            <span>💰 <span id="gold-val">500</span></span>
            <span>🏆 <span id="cups-val">0</span></span>
        </div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div style="text-align:center; padding:50px 20px; background: linear-gradient(to bottom, #2980b9, #2c3e50); border-radius:20px; border:4px solid #fff;">
                <h1 id="arena-txt" style="font-family:'Bangers'; font-size:35px; margin:0; color:#fff">ESTADIO DUENDE</h1>
                <p style="color:#fff">ARENA <span id="arena-num">1</span></p>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:6px solid #d35400; padding:15px 50px; font-family:'Bangers'; font-size:35px; color:#fff; border-radius:15px; margin-top:20px;">¡BATALLA!</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <div class="section-title">Tu Mazo de Batalla</div>
            <div class="card-grid" id="deck-grid"></div>
            
            <div class="section-title">Colección y Mejoras</div>
            <div class="card-grid" id="collection-grid"></div>
        </div>

        <div id="view-pass" class="view">
            <h2 style="font-family:'Bangers'; text-align:center;">PASE DE BATALLA</h2>
            <div class="sub-page active-view" style="padding:0">
                <div class="pass-row locked"><span>Nivel 1: ✅ 100 Oro</span></div>
                <div class="pass-row locked"><span>Nivel 2: 🔒 200 Oro</span></div>
                <div class="pass-row locked"><span>Nivel 3: 🔒 Cofre Gigante</span></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>MAZO</div>
        <div class="nav-item active-nav" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchTab('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-bg"><div id="elixir-fill"></div></div>
        </div>
    </div>
</div>

<script>
    // --- DATOS ---
    const CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", cost: 3, hp: 1400, dmg: 160, speed: 1.2, range: 45 },
        { id: 1, name: "Archeras", emoji: "🏹", cost: 3, hp: 600, dmg: 90, speed: 1.1, range: 200 },
        { id: 2, name: "Gigante", emoji: "🧔", cost: 5, hp: 3500, dmg: 210, speed: 0.8, range: 50, target: "tower" },
        { id: 3, name: "Mago", emoji: "🔥", cost: 5, hp: 700, dmg: 240, speed: 1.0, range: 190 },
        // ... (el set de 20 cartas)
    ];

    const ARENA_THEMES = [
        { name: "Estadio Duende", min: 0, ground: 0x2ecc71, secondary: 0x27ae60 },
        { name: "Foso de Huesos", min: 400, ground: 0xbdc3c7, secondary: 0x95a5a6 },
        { name: "Coliseo Bárbaro", min: 800, ground: 0xe67e22, secondary: 0xd35400 }
    ];

    let player = { name: "", gold: 500, trophies: 0, deck: [0, 1, 2, 3], lvls: {}, arena: 1 };
    let cardToPlay = null;

    // --- DATOS Y LOGIN ---
    function login() {
        const input = document.getElementById('user-name').value;
        if(!input) return alert("Escribe tu nombre");
        player.name = input;
        const data = localStorage.getItem('mash_pro_final_' + input);
        if(data) player = JSON.parse(data);
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
    }
    function save() { localStorage.setItem('mash_pro_final_' + player.name, JSON.stringify(player)); }

    // --- NAVEGACIÓN ---
    function switchTab(viewId, el) {
        if (inBattle) return;
        document.querySelectorAll('.view').forEach(p => p.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('view-' + viewId).classList.add('active-view');
        el.classList.add('active-nav');
        if (viewId === 'cards') renderCards();
    }

    function renderCards() {
        document.getElementById('deck-grid').innerHTML = player.deck.map(id => createCardHTML(CARDS[id], true)).join('');
        document.getElementById('collection-grid').innerHTML = CARDS.map(c => createCardHTML(c, false)).join('');
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        return `<div class="card ${isDeck ? 'in-deck' : ''}" onclick="openUpgrade(${c.id})">
                    <div style="font-size:30px">${c.emoji}</div>
                    <div style="font-size:10px; font-weight:800; color:var(--gold);">${c.name.toUpperCase()}</div>
                    <div class="lvl-badge">Lv ${lvl}</div>
                </div>`;
    }

    // --- BATALLA 3D (MOTOR AVANZADO + ARENA ARREGLADA) ---
    let scene, camera, renderer, clock, elixir = 0;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let towers = [], units = [];

    function openBattle() {
        document.getElementById('battle-view').style.display = 'block';
        init3DArena();
    }

    function init3DArena() {
        scene = new THREE.Scene();
        const theme = ARENA_THEMES[Math.floor(player.trophies/500) % ARENA_THEMES.length];
        scene.background = new THREE.Color(theme.ground);
        
        camera = new THREE.PerspectiveCamera(75, 480/800, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('app-container').clientWidth, window.innerHeight - 150);
        document.getElementById('battle-canvas').innerHTML = "";
        document.getElementById('battle-canvas').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(5, 10, 7.5); scene.add(sun);

        camera.position.set(0, 30, 25);
        camera.lookAt(0, 0, -5);

        // --- ARREGLO DE LA ARENA (GRID + TEXTURA + DETALLE) ---
        // El suelo con cuadrícula táctica (el "grid" de Crash Royale)
        const size = 22;
        const divisions = 11;
        const gridHelper = new THREE.GridHelper(size, divisions, 0x000000, 0x000000);
        gridHelper.position.y = 0.05;
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Terreno base
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(22, 44), new THREE.MeshLambertMaterial({color: theme.secondary}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // Río y Puentes
        const river = new THREE.Mesh(new THREE.PlaneGeometry(22, 4), new THREE.MeshLambertMaterial({color: 0x3498db}));
        river.rotation.x = -Math.PI/2; river.position.y = 0.01;
        scene.add(river);

        // Puentes con textura de madera
        createBridge(-6); createBridge(6);

        // Torres (Detalladas y Fotorrealistas)
        spawnTower(0, 18, 0x2980b9, 3); // Rey Aliado
        spawnTower(-7, 12, 0x2980b9, 2); // Princesa L
        spawnTower(7, 12, 0x2980b9, 2);  // Princesa R
        
        spawnTower(0, -18, 0xc0392b, 3); // Rey Enemigo
        spawnTower(-7, -12, 0xc0392b, 2);
        spawnTower(7, -12, 0xc0392b, 2);

        renderBattleHand();
        renderer.domElement.addEventListener('click', deployUnit3D);
        battleLoop();
    }

    function createBridge(x) {
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 5), new THREE.MeshLambertMaterial({color: 0x8e6029}));
        bridge.position.set(x, 0.1, 0);
        scene.add(bridge);
    }

    function spawnTower(x, z, color, size) {
        // Torres con geometría compleja (base + techo + pináculo)
        const group = new THREE.Group();
        const base = new THREE.Mesh(new THREE.CylinderGeometry(size*0.7, size*0.8, size*1.5, 8), new THREE.MeshLambertMaterial({color: color}));
        const roof = new THREE.Mesh(new THREE.CylinderGeometry(size*0.5, size*0.6, 1, 8), new THREE.MeshLambertMaterial({color: 0x333333}));
        roof.position.y = size*0.9;
        group.add(base); group.add(roof);
        group.position.set(x, size*0.75, z);
        scene.add(group);
        towers.push({mesh: group, hp: 2000});
    }

    // --- LÓGICA DE BATALLA ---
    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = player.deck.map(id => {
            const c = CARDS[id];
            return `<div class="mini-card" onclick="selectCard(${id}, this)">
                <span style="font-size:24px">${c.emoji}</span>
                <span style="color:var(--purple); font-weight:900">💧${c.cost}</span>
            </div>`;
        }).join('');
    }

    function selectCard(id, el) {
        cardToPlay = CARDS.find(c => c.id === id);
        document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('active-play'));
        el.classList.add('active-play');
    }

    function deployUnit3D(event) {
        if (!cardToPlay || elixir < cardToPlay.cost) return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);

        if (intersects.length > 0) {
            let pt = intersects[0].point;
            if (pt.z > 2) { // Solo desplegar en tu campo
                elixir -= cardToPlay.cost;
                spawnUnitMesh(pt.x, pt.z, 0x3498db); // Aliado
                cardToPlay = null;
                document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('active-play'));
            }
        }
    }

    function spawnUnitMesh(x, z, color) {
        const geo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const mat = new THREE.MeshPhongMaterial({color: color});
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, 1, z);
        scene.add(mesh);
        units.push({mesh, speed: 0.1});
        
        const move = () => {
            mesh.position.z -= 0.1;
            if (mesh.position.z > -18) requestAnimationFrame(move);
            else { scene.remove(mesh); finishBattle(true); }
        };
        move();
    }

    function battleLoop() {
        if (document.getElementById('battle-view').style.display === 'none') return;
        requestAnimationFrame(battleLoop);
        elixir = Math.min(10, elixir + 0.01);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
        renderer.render(scene, camera);
    }

    function finishBattle(win) {
        alert("¡TORRE DESTRUIDA! +30 Copas");
        player.trophies += 30; player.gold += 100;
        document.getElementById('battle-view').style.display = 'none';
        save(); updateUI();
    }

    function updateUI() {
        document.getElementById('display-name').innerText = player.name.toUpperCase();
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
    }

    updateUI();
</script>
</body>
</html>
