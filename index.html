<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        
        :root {
            --gold: #f1c40f;
            --purple: #e056fd;
            --blue: #3498db;
            --dark: #121212;
        }

        body { 
            margin: 0; background: #000; font-family: 'Bangers', cursive; 
            color: white; overflow: hidden; display: flex; justify-content: center; 
        }

        #app-container {
            width: 100%; max-width: 480px; height: 100vh;
            position: relative; background: #2c3e50;
            border-left: 2px solid #333; border-right: 2px solid #333;
        }

        /* --- PANTALLAS --- */
        .page {
            display: none; width: 100%; height: calc(100% - 75px);
            position: absolute; top: 0; overflow-y: auto; box-sizing: border-box;
        }
        .active { display: block; }

        /* --- PANTALLA INICIO --- */
        #home-page {
            background: linear-gradient(to bottom, #1e3799, #0c2461);
            text-align: center; padding: 60px 20px;
        }
        .arena-card {
            background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px;
            border: 2px solid var(--gold); margin: 30px 0;
        }
        .current-deck-preview { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .mini-card-preview {
            background: #34495e; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--gold); font-size: 30px; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- PANTALLA MAZO --- */
        #deck-page { background: #1a1a1a; padding: 15px; }
        .deck-header {
            position: sticky; top: 0; background: #222; padding: 15px;
            border-radius: 10px; border: 2px solid var(--gold);
            margin-bottom: 20px; text-align: center; z-index: 10;
        }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 20px; }
        .card-item {
            background: #2c3e50; border-radius: 10px; padding: 10px;
            text-align: center; cursor: pointer; border: 3px solid transparent;
            position: relative; transition: 0.1s;
        }
        .card-item.selected { border-color: var(--gold); background: #34495e; }
        .card-cost-tag {
            background: var(--purple); border-radius: 50%; width: 22px; height: 22px;
            font-size: 14px; position: absolute; top: 5px; left: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- BOTÓN BATALLA --- */
        .battle-btn {
            background: #e67e22; border: 4px solid #d35400; color: white;
            font-family: 'Bangers'; font-size: 45px; padding: 20px 70px;
            border-radius: 20px; cursor: pointer; box-shadow: 0 8px 0 #a04000;
            margin-top: 40px;
        }
        .battle-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #a04000; }
        .battle-btn:disabled { background: #7f8c8d; border-color: #95a5a6; box-shadow: none; opacity: 0.6; }

        /* --- BARRA DE NAVEGACIÓN --- */
        #nav-bar {
            position: absolute; bottom: 0; width: 100%; height: 75px;
            background: #111; display: flex; justify-content: space-around;
            align-items: center; border-top: 4px solid #444; z-index: 100;
        }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #7f8c8d; font-size: 14px; }
        .nav-item.active-nav { color: var(--gold); }
        .nav-icon { font-size: 24px; display: block; }

        /* --- UI DE BATALLA --- */
        #battle-canvas { display: none; background: #000; }
        #battle-ui-overlay {
            position: absolute; top: 15px; width: 100%; text-align: center;
            display: none; pointer-events: none; z-index: 60;
        }
        .timer-box { 
            background: rgba(0,0,0,0.8); padding: 5px 20px; border-radius: 12px; 
            border: 2px solid var(--gold); display: inline-block; font-size: 24px;
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="battle-ui-overlay">
        <div class="timer-box" id="timer-text">3:00</div>
        <div id="arena-name-battle" style="font-size: 14px; color: var(--gold); text-shadow: 1px 1px #000;"></div>
    </div>

    <div id="deck-page" class="page">
        <div class="deck-header">
            <div style="font-size: 24px;">TU MAZO: <span id="deck-count">0</span>/4</div>
            <div style="font-size: 12px; color: var(--gold);">Selecciona las cartas para la batalla</div>
        </div>
        <div class="card-grid" id="inventory-grid"></div>
    </div>

    <div id="home-page" class="page active">
        <h1 style="font-size: 60px; text-shadow: 4px 4px #000; margin: 0;">MASHROYALE</h1>
        
        <div class="arena-card">
            <div id="home-arena-name" style="font-size: 28px; color: var(--gold);">ARENA 1</div>
            <div id="home-wins" style="font-size: 18px;">Victorias: 0</div>
        </div>

        <div style="margin-top: 20px;">
            <p>MAZO SELECCIONADO:</p>
            <div class="current-deck-preview" id="home-deck-list"></div>
        </div>

        <button id="main-battle-btn" class="battle-btn" onclick="startFullBattle()" disabled>¡BATALLA!</button>
        <p id="deck-warning" style="color: #ff7675; margin-top: 10px;">Elige 4 cartas en la pestaña Mazo</p>
    </div>

    <canvas id="battle-canvas" width="480" height="800"></canvas>

    <div id="nav-bar">
        <div class="nav-item" onclick="switchTab('deck', this)">
            <span class="nav-icon">🃏</span>MAZO
        </div>
        <div class="nav-item active-nav" onclick="switchTab('home', this)">
            <span class="nav-icon">⚔️</span>INICIO
        </div>
    </div>
</div>

<script>
    // --- DATOS Y CARTAS (100 TOTAL) ---
    const emojis = ["🧔","🤖","🏇","👩‍🚀","💀","🐗","🐉","🧙‍♂️","🏹","🗡️","🦁","🐺","🔥","⚡","👻","🧛","🧚","🦖","🦍","💎"];
    const names = ["GUERRERO","PEKKA","MONTAS","MAGO","SUDOR","GIGANTE","ELITE","CAZADOR","FUEGO","CHISPA"];
    const ALL_CARDS = [];

    function generate100Cards() {
        for(let i=0; i<100; i++) {
            ALL_CARDS.push({
                id: i,
                name: names[i % names.length] + " " + (i+1),
                emoji: emojis[i % emojis.length],
                cost: (i % 5) + 1,
                hp: 600 + (Math.random() * 2500),
                dmg: 100 + (Math.random() * 400),
                speed: 1.0 + (Math.random() * 1.5),
                range: Math.random() > 0.8 ? 200 : 45,
                atkSpeed: 1000 + (Math.random() * 800),
                target: Math.random() > 0.8 ? "building" : "any"
            });
        }
    }
    generate100Cards();

    // --- ESTADO ---
    let myDeckIds = [];
    let wins = 0;
    let currentArena = 1;
    let cardLevel = 1.0;
    let inBattle = false;

    const ARENAS = {
        1: { name: "ESTADIO DUENDE", ground: "#27ae60", river: "#2980b9", bridge: "#7e5109", enemyMult: 1.0 },
        2: { name: "FOSO DE HUESOS", ground: "#535c68", river: "#130f40", bridge: "#30336b", enemyMult: 1.3 },
        3: { name: "COLISEO BÁRBARO", ground: "#d35400", river: "#8e44ad", bridge: "#2c3e50", enemyMult: 1.6 },
        4: { name: "ARENA LEGENDARIA", ground: "#130f40", river: "#00d2ff", bridge: "#f1c40f", enemyMult: 2.2 }
    };

    // --- NAVEGACIÓN ---
    function switchTab(tabId, el) {
        if(inBattle) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(tabId + '-page').classList.add('active');
        el.classList.add('active-nav');
        if(tabId === 'deck') renderInventory();
        if(tabId === 'home') updateHomeUI();
    }

    function renderInventory() {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = ALL_CARDS.map(c => `
            <div class="card-item ${myDeckIds.includes(c.id)?'selected':''}" onclick="toggleCard(${c.id})">
                <div class="card-cost-tag">${c.cost}</div>
                <div style="font-size: 40px;">${c.emoji}</div>
                <div style="font-size: 11px; color: var(--gold);">${c.name}</div>
            </div>
        `).join('');
        document.getElementById('deck-count').innerText = myDeckIds.length;
    }

    function toggleCard(id) {
        const pos = myDeckIds.indexOf(id);
        if(pos > -1) myDeckIds.splice(pos, 1);
        else if(myDeckIds.length < 4) myDeckIds.push(id);
        renderInventory();
        updateHomeUI();
    }

    function updateHomeUI() {
        const homeDeck = document.getElementById('home-deck-list');
        const btn = document.getElementById('main-battle-btn');
        const warning = document.getElementById('deck-warning');
        
        homeDeck.innerHTML = myDeckIds.map(id => {
            const c = ALL_CARDS.find(x => x.id === id);
            return `<div class="mini-card-preview">${c.emoji}</div>`;
        }).join('');

        const ready = myDeckIds.length === 4;
        btn.disabled = !ready;
        warning.style.display = ready ? 'none' : 'block';
        document.getElementById('home-wins').innerText = `Victorias: ${wins}`;
        document.getElementById('home-arena-name').innerText = ARENAS[currentArena].name;
    }

    // --- MOTOR DE BATALLA REAL ---
    const canvas = document.getElementById('battle-canvas');
    const ctx = canvas.getContext('2d');
    const W = 480, H = 800;
    const PUENTES = [{ x: 95, y: H/2 }, { x: 385, y: H/2 }];

    let units = [], towers = [], projectiles = [];
    let playerHand = [], deckIndex = 0;
    let playerElixir = 5, enemyElixir = 5;
    let selectedCard = -1, gameTime = 180, gameOver = false;
    let lastElixirUpdate = Date.now(), lastAIAction = Date.now();

    function startFullBattle() {
        inBattle = true;
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('nav-bar').style.display = 'none';
        document.getElementById('battle-ui-overlay').style.display = 'block';
        canvas.style.display = 'block';

        initBattleSystem();
        requestAnimationFrame(battleLoop);
    }

    function initBattleSystem() {
        units = []; projectiles = [];
        const m = ARENAS[currentArena].enemyMult;
        document.getElementById('arena-name-battle').innerText = ARENAS[currentArena].name;
        
        towers = [
            { x: 95, y: 150, team: 1, hp: 2500*m, max: 2500*m, range: 170, dmg: 95*m, atkSpeed: 900, lastAttack: 0 },
            { x: 385, y: 150, team: 1, hp: 2500*m, max: 2500*m, range: 170, dmg: 95*m, atkSpeed: 900, lastAttack: 0 },
            { x: 240, y: 80, team: 1, hp: 4200*m, max: 4200*m, isKing: true, range: 200, dmg: 110*m, atkSpeed: 1100, lastAttack: 0 },
            { x: 95, y: 600, team: 0, hp: 2500*cardLevel, max: 2500*cardLevel, range: 170, dmg: 95*cardLevel, atkSpeed: 900, lastAttack: 0 },
            { x: 385, y: 600, team: 0, hp: 2500*cardLevel, max: 2500*cardLevel, range: 170, dmg: 95*cardLevel, atkSpeed: 900, lastAttack: 0 },
            { x: 240, y: 670, team: 0, hp: 4200*cardLevel, max: 4200*cardLevel, isKing: true, range: 200, dmg: 110*cardLevel, atkSpeed: 1100, lastAttack: 0 }
        ];

        playerHand = myDeckIds.map(id => ({...ALL_CARDS.find(c => c.id === id)}));
        playerElixir = 5; enemyElixir = 5; gameTime = 180; gameOver = false;
        lastElixirUpdate = Date.now();
    }

    function updateBattle() {
        if (gameOver) return;
        const now = Date.now();

        // Elixir y Tiempo
        if (now - lastElixirUpdate > 1000) {
            playerElixir = Math.min(10, playerElixir + 0.5);
            enemyElixir = Math.min(10, enemyElixir + (0.4 * ARENAS[currentArena].enemyMult));
            gameTime--;
            document.getElementById('timer-text').innerText = `${Math.floor(gameTime/60)}:${(gameTime%60).toString().padStart(2,'0')}`;
            lastElixirUpdate = now;
            if(gameTime <= 0) finishBattle(2); // Empate por tiempo
        }

        // IA Enemiga (Usa cartas aleatorias de todo el pool para ser impredecible)
        if (now - lastAIAction > 3000 / ARENAS[currentArena].enemyMult) {
            const randomEnemyCard = ALL_CARDS[Math.floor(Math.random() * 100)];
            if (enemyElixir >= randomEnemyCard.cost) {
                enemyElixir -= randomEnemyCard.cost;
                const m = ARENAS[currentArena].enemyMult;
                units.push({...randomEnemyCard, x: Math.random()>0.5?95:385, y: 150, team: 1, currentHp: randomEnemyCard.hp*m, dmg: randomEnemyCard.dmg*m, speed: randomEnemyCard.speed*(1+m/12), lastAttack: 0});
                lastAIAction = now;
            }
        }

        // Lógica de movimiento por puentes e IA de ataque
        units.forEach(u => {
            let targets = u.target === "building" ? towers.filter(t => t.team !== u.team && t.hp > 0) : 
                          [...towers.filter(t => t.team !== u.team && t.hp > 0), ...units.filter(un => un.team !== u.team)];
            
            let closest = targets.reduce((prev, curr) => {
                const d = Math.hypot(curr.x - u.x, curr.y - u.y);
                return d < prev.d ? {t:curr, d:d} : prev;
            }, {t:null, d:Infinity});

            if (closest.t) {
                let dX = closest.t.x, dY = closest.t.y;
                // Si el objetivo está al otro lado del río, ir al puente
                if ((u.team === 0 && u.y > H/2 && closest.t.y < H/2) || (u.team === 1 && u.y < H/2 && closest.t.y > H/2)) {
                    const p = u.x < W/2 ? PUENTES[0] : PUENTES[1];
                    dX = p.x; dY = p.y;
                }

                const distReal = Math.hypot(closest.t.x - u.x, closest.t.y - u.y);
                if (distReal > u.range) {
                    const angle = Math.atan2(dY - u.y, dX - u.x);
                    u.x += Math.cos(angle) * u.speed;
                    u.y += Math.sin(angle) * u.speed;
                } else if (now - u.lastAttack > u.atkSpeed) {
                    u.lastAttack = now;
                    if (closest.t.currentHp !== undefined) closest.t.currentHp -= u.dmg; else closest.t.hp -= u.dmg;
                }
            }
        });

        // Torres disparando
        towers.forEach(t => {
            if (t.hp <= 0) return;
            let target = units.find(u => u.team !== t.team && Math.hypot(u.x - t.x, u.y - t.y) < t.range);
            if (target && now - t.lastAttack > t.atkSpeed) {
                t.lastAttack = now;
                projectiles.push({x: t.x, y: t.y, tx: target.x, ty: target.y, dmg: t.dmg, target});
            }
        });

        // Proyectiles
        projectiles.forEach((p, i) => {
            const angle = Math.atan2(p.ty - p.y, p.tx - p.x);
            p.x += Math.cos(angle) * 12; p.y += Math.sin(angle) * 12;
            if (Math.hypot(p.tx - p.x, p.ty - p.y) < 15) {
                if (p.target.currentHp !== undefined) p.target.currentHp -= p.dmg;
                projectiles.splice(i, 1);
            }
        });

        units = units.filter(u => u.currentHp > 0);
        if (towers[2].hp <= 0) finishBattle(0); // Victoria
        if (towers[5].hp <= 0) finishBattle(1); // Derrota
    }

    function drawBattle() {
        const theme = ARENAS[currentArena];
        // Campo
        ctx.fillStyle = theme.ground; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(65, 0, 60, H); ctx.fillRect(355, 0, 60, H);
        ctx.fillStyle = theme.river; ctx.fillRect(0, H/2 - 25, W, 50);
        PUENTES.forEach(p => { ctx.fillStyle = theme.bridge; ctx.fillRect(p.x-40, p.y-30, 80, 60); });

        // Torres
        towers.forEach(t => {
            if (t.hp <= 0) return;
            ctx.fillStyle = t.team === 0 ? "#2980b9" : "#c0392b";
            const s = t.isKing ? 52 : 42;
            ctx.fillRect(t.x-s/2, t.y-s/2, s, s);
            ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.textAlign="center";
            ctx.fillText(t.isKing?"👑":"🏰", t.x, t.y+7);
            // Vida torre
            ctx.fillStyle="black"; ctx.fillRect(t.x-25, t.y-(s/2)-12, 50, 6);
            ctx.fillStyle="#2ecc71"; ctx.fillRect(t.x-25, t.y-(s/2)-12, 50*(t.hp/t.max), 6);
        });

        // Unidades
        units.forEach(u => {
            ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.fillText(u.emoji, u.x, u.y+10);
            ctx.fillStyle = "black"; ctx.fillRect(u.x-15, u.y-22, 30, 4);
            ctx.fillStyle = u.team === 0 ? "cyan" : "red";
            const max = u.hp * (u.team === 0 ? cardLevel : ARENAS[currentArena].enemyMult);
            ctx.fillRect(u.x-15, u.y-22, 30 * (u.currentHp/max), 4);
        });

        // Proyectiles
        projectiles.forEach(p => { ctx.fillStyle="yellow"; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); });

        // MANO DE BATALLA
        ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, H-150, W, 150);
        playerHand.forEach((c, i) => {
            const x = 20 + i * 110, y = H-130;
            ctx.fillStyle = playerElixir >= c.cost ? "#34495e" : "#222";
            ctx.fillRect(x, y, 95, 110);
            if(selectedCard === i) { ctx.strokeStyle="white"; ctx.lineWidth=3; ctx.strokeRect(x,y,95,110); }
            ctx.fillStyle="white"; ctx.font="35px Arial"; ctx.fillText(c.emoji, x+47, y+60);
            ctx.fillStyle="#e056fd"; ctx.beginPath(); ctx.arc(x+15, y+15, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="white"; ctx.font="14px Bangers"; ctx.fillText(c.cost, x+15, y+20);
        });
        // Barra Elixir
        ctx.fillStyle="#333"; ctx.fillRect(20, H-15, W-40, 10);
        ctx.fillStyle="#e056fd"; ctx.fillRect(20, H-15, (playerElixir/10)*(W-40), 10);
    }

    function battleLoop() {
        if(!inBattle) return;
        updateBattle();
        drawBattle();
        if(!gameOver) requestAnimationFrame(battleLoop);
    }

    function finishBattle(result) {
        gameOver = true;
        inBattle = false;
        if(result === 0) {
            wins++;
            if(wins % 2 === 0 && currentArena < 4) { currentArena++; cardLevel += 0.2; }
        }
        
        setTimeout(() => {
            canvas.style.display = 'none';
            document.getElementById('battle-ui-overlay').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('home-page').classList.add('active');
            updateHomeUI();
        }, 3000);
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (W/rect.width), my = (e.clientY - rect.top) * (H/rect.height);
        if (my > H-150) {
            const i = Math.floor((mx-20)/110);
            if (i >= 0 && i < 4) selectedCard = i;
        } else if (selectedCard !== -1 && my > H/2) {
            const c = playerHand[selectedCard];
            if (playerElixir >= c.cost) {
                playerElixir -= c.cost;
                units.push({...c, x:mx, y:my, team:0, currentHp: c.hp*cardLevel, dmg: c.dmg*cardLevel, speed: c.speed*(1+cardLevel/15), lastAttack:0});
                selectedCard = -1;
            }
        }
    });

    updateHomeUI();
</script>
</body>
</html>
