<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale Ultra 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@800&display=swap');
        
        :root {
            --purple: #ff00ff; --gold: #f1c40f; --blue: #3498db; --red: #e74c3c;
        }

        body { margin: 0; background: #1a1a1a; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; margin: auto; display: flex; flex-direction: column; background: #2c3e50; }

        /* HEADER */
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 3px solid var(--gold); z-index: 100; }
        #display-name { font-family: 'Bangers'; font-size: 24px; color: #fff; text-shadow: 2px 2px #000; }

        /* CARDS VIEW */
        #page-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }
        
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { 
            background: linear-gradient(135deg, #34495e, #2c3e50); border-radius: 8px; 
            border: 2px solid #555; position: relative; padding: 10px 2px; text-align: center;
            box-shadow: 0 4px #000; cursor: pointer;
        }
        .card.in-deck { border: 3px solid #fff; box-shadow: 0 0 15px #fff; transform: scale(1.05); }
        .lvl-tag { position: absolute; bottom: -5px; right: -5px; background: #fff; color: #000; font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }

        /* NAV */
        nav { height: 70px; background: #111; display: flex; border-top: 4px solid #000; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #666; }
        .nav-item.active { color: var(--gold); background: rgba(255,255,255,0.05); }

        /* BATTLE UI */
        #battle-view { display: none; position: absolute; inset: 0; z-index: 500; }
        #ui-battle { position: absolute; bottom: 0; width: 100%; padding: 10px; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .hand { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
        .mini-card { width: 65px; height: 85px; background: #2c3e50; border: 2px solid #fff; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .mini-card.selected { border-color: var(--gold); transform: translateY(-10px); }
        
        .elixir-container { position: relative; height: 20px; background: #333; border-radius: 10px; border: 2px solid #000; }
        #elixir-fill { height: 100%; background: var(--purple); width: 0%; transition: 0.1s linear; border-radius: 8px; }
        #elixir-text { position: absolute; width: 100%; text-align: center; top: 0; font-weight: 900; font-size: 14px; text-shadow: 1px 1px #000; }

        #card-modal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: #2c3e50; border: 4px solid var(--gold); border-radius: 20px; z-index: 2000; padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div id="display-name">SAMUEL</div>
        <div style="font-weight: 800;">💰 <span id="gold-val">1000</span> | 🏆 <span id="cups-val">0</span></div>
    </header>

    <div id="page-container">
        <div id="view-home" class="view active-view">
            <div id="arena-card" style="text-align:center; padding:60px 20px; border-radius:20px; border:5px solid #fff; margin-top:30px; background: #27ae60;">
                <h1 id="arena-name" style="font-family:'Bangers'; font-size:40px; margin:0;">ARENA 1</h1>
                <p>CÉSPED CLÁSICO</p>
                <button onclick="openBattle()" style="background:#e67e22; border:none; border-bottom:6px solid #d35400; padding:15px 50px; font-family:'Bangers'; font-size:30px; color:#fff; border-radius:15px; cursor:pointer;">¡LUCHAR!</button>
            </div>
        </div>

        <div id="view-cards" class="view">
            <div class="card-grid" id="deck-grid"></div>
            <hr style="margin:20px 0; border:1px solid #444;">
            <div class="card-grid" id="collection-grid"></div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchTab('cards', this)"><span>🃏</span>CARTAS</div>
        <div class="nav-item active" onclick="switchTab('home', this)"><span>⚔️</span>INICIO</div>
    </nav>

    <div id="battle-view">
        <div id="battle-canvas"></div>
        <div id="ui-battle">
            <div class="hand" id="battle-hand"></div>
            <div class="elixir-container">
                <div id="elixir-fill"></div>
                <div id="elixir-text">0 / 10</div>
            </div>
        </div>
    </div>

    <div id="card-modal">
        <h2 id="modal-title" style="font-family:'Bangers'; color:var(--gold)"></h2>
        <div id="modal-emoji" style="font-size:60px"></div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
            <button onclick="useCard()" style="background:var(--blue); border:none; padding:12px; border-radius:8px; color:#fff; font-weight:800;">USAR</button>
            <button id="btn-up" onclick="upgradeCard()" style="background:var(--gold); border:none; padding:12px; border-radius:8px; font-weight:800;">MEJORAR</button>
        </div>
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#aaa; text-decoration:underline;">Cerrar</button>
    </div>
</div>

<script>
    const ALL_CARDS = [
        { id: 0, name: "Caballero", emoji: "⚔️", cost: 3, hp: 1400 },
        { id: 1, name: "Gigante", emoji: "🧔", cost: 5, hp: 3500 },
        { id: 2, name: "Montapuerco", emoji: "🐗", cost: 4, hp: 1500 },
        { id: 3, name: "Mini PEKKA", emoji: "🤖", cost: 4, hp: 1100 },
        { id: 4, name: "Mago", emoji: "🔥", cost: 5, hp: 700 },
        { id: 5, name: "Bebé Dragón", emoji: "🐉", cost: 4, hp: 1100 },
        { id: 6, name: "Príncipe", emoji: "🏇", cost: 5, hp: 1800 },
        { id: 7, name: "Megacaballero", emoji: "🛡️", cost: 7, hp: 3500 }
    ];

    let player = { deck: [0, 1, 2, 3], gold: 1000, trophies: 0, lvls: {} };
    let selectedId = null;
    let cardToPlay = null;

    // --- RENDERER 3D CONFIG ---
    let scene, camera, renderer, elixir = 0;
    const ARENA_THEMES = [
        { name: "Estadio Duende", color: 0x27ae60, secondary: 0x2ecc71 },
        { name: "Foso de Huesos", color: 0xd35400, secondary: 0xe67e22 },
        { name: "Fuerte del Aire", color: 0x2980b9, secondary: 0x3498db }
    ];

    function init3D() {
        scene = new THREE.Scene();
        const theme = ARENA_THEMES[Math.floor(player.trophies/500) % ARENA_THEMES.length];
        scene.background = new THREE.Color(theme.color);

        camera = new THREE.PerspectiveCamera(60, 480/800, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('app-container').clientWidth, window.innerHeight - 150);
        document.getElementById('battle-canvas').innerHTML = "";
        document.getElementById('battle-canvas').appendChild(renderer.domElement);

        camera.position.set(0, 32, 28);
        camera.lookAt(0, 0, -5);

        // ILUMINACIÓN
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // EL "GRID" (CUADROS) - Como en la imagen
        const size = 22;
        const divisions = 11;
        const gridHelper = new THREE.GridHelper(size, divisions, 0x000000, 0x000000);
        gridHelper.position.y = 0.1;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // SUELO
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(22, 44), new THREE.MeshLambertMaterial({color: theme.secondary}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // RÍO Y PUENTES
        const river = new THREE.Mesh(new THREE.PlaneGeometry(22, 4), new THREE.MeshLambertMaterial({color: 0x3498db}));
        river.rotation.x = -Math.PI/2; river.position.y = 0.05;
        scene.add(river);

        // TORRES CON DETALLE
        createDetailedTower(0, 18, 0x2980b9, 3); // Rey
        createDetailedTower(-7, 12, 0x2980b9, 2); // Princesa L
        createDetailedTower(7, 12, 0x2980b9, 2);  // Princesa R
        
        createDetailedTower(0, -18, 0xc0392b, 3); // Rey E
        createDetailedTower(-7, -12, 0xc0392b, 2);
        createDetailedTower(7, -12, 0xc0392b, 2);

        renderer.domElement.addEventListener('click', deployUnit);
        battleLoop();
    }

    function createDetailedTower(x, z, color, type) {
        const group = new THREE.Group();
        // Base cuadrada
        const base = new THREE.Mesh(new THREE.BoxGeometry(type, type*1.5, type), new THREE.MeshLambertMaterial({color: 0x7f8c8d}));
        // Techo color equipo
        const top = new THREE.Mesh(new THREE.CylinderGeometry(type*0.6, type*0.6, 0.5, 8), new THREE.MeshLambertMaterial({color: color}));
        top.position.y = type*0.8;
        group.add(base); group.add(top);
        group.position.set(x, type*0.75, z);
        scene.add(group);
    }

    function openBattle() {
        document.getElementById('battle-view').style.display = 'block';
        elixir = 0;
        init3D();
        renderBattleHand();
    }

    function battleLoop() {
        if(document.getElementById('battle-view').style.display === 'none') return;
        requestAnimationFrame(battleLoop);
        
        elixir = Math.min(10, elixir + 0.015);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
        document.getElementById('elixir-text').innerText = Math.floor(elixir) + " / 10";
        
        renderer.render(scene, camera);
    }

    function renderBattleHand() {
        const hand = document.getElementById('battle-hand');
        hand.innerHTML = player.deck.map(id => {
            const c = ALL_CARDS[id];
            return `<div class="mini-card" onclick="selectToPlay(${id}, this)">
                <span style="font-size:24px">${c.emoji}</span>
                <span style="color:var(--purple); font-weight:900">💧${c.cost}</span>
            </div>`;
        }).join('');
    }

    function selectToPlay(id, el) {
        cardToPlay = ALL_CARDS[id];
        document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('selected'));
        el.classList.add('selected');
    }

    function deployUnit(e) {
        if(!cardToPlay || elixir < cardToPlay.cost) return;
        
        // Simulación de despliegue en 3D
        const unit = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshLambertMaterial({color: 0x3498db}));
        unit.position.set((Math.random()-0.5)*10, 1, 8);
        scene.add(unit);
        
        elixir -= cardToPlay.cost;
        cardToPlay = null;
        document.querySelectorAll('.mini-card').forEach(m => m.classList.remove('selected'));

        // Movimiento simple hacia adelante
        const move = () => {
            unit.position.z -= 0.1;
            if(unit.position.z > -18) requestAnimationFrame(move);
            else { alert("¡TORRE DESTRUIDA!"); document.getElementById('battle-view').style.display = 'none'; player.trophies += 30; updateUI(); }
        };
        move();
    }

    // --- UI LOGIC ---
    function switchTab(tab, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active-view');
        el.classList.add('active');
        if(tab === 'cards') renderCards();
    }

    function renderCards() {
        document.getElementById('deck-grid').innerHTML = player.deck.map(id => createCardHTML(ALL_CARDS[id], true)).join('');
        document.getElementById('collection-grid').innerHTML = ALL_CARDS.map(c => createCardHTML(c, false)).join('');
    }

    function createCardHTML(c, isDeck) {
        const lvl = player.lvls[c.id] || 1;
        return `<div class="card ${isDeck ? 'in-deck' : ''}" onclick="openModal(${c.id})">
            <div style="font-size:30px">${c.emoji}</div>
            <div style="font-size:10px; font-weight:900; color:var(--gold)">${c.name.toUpperCase()}</div>
            <div class="lvl-tag">LVL ${lvl}</div>
        </div>`;
    }

    function openModal(id) {
        selectedId = id;
        document.getElementById('modal-title').innerText = ALL_CARDS[id].name;
        document.getElementById('modal-emoji').innerText = ALL_CARDS[id].emoji;
        document.getElementById('card-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('card-modal').style.display = 'none'; }

    function useCard() {
        if(!player.deck.includes(selectedId)) {
            player.deck.shift(); player.deck.push(selectedId);
            renderCards(); closeModal();
        }
    }

    function upgradeCard() {
        const lvl = player.lvls[selectedId] || 1;
        if(player.gold >= 500) {
            player.gold -= 500;
            player.lvls[selectedId] = lvl + 1;
            updateUI(); renderCards();
        }
    }

    function updateUI() {
        document.getElementById('gold-val').innerText = player.gold;
        document.getElementById('cups-val').innerText = player.trophies;
        const theme = ARENA_THEMES[Math.floor(player.trophies/500) % ARENA_THEMES.length];
        document.getElementById('arena-name').innerText = theme.name;
        document.getElementById('arena-card').style.background = "#" + theme.color.toString(16);
    }

    updateUI();
</script>
</body>
</html>
